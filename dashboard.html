<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="assets/img/icon.png" />
  <script src="assets/js/theme.js?v=20260723a"></script>
  <title>Project Home — Planners Dashboard</title>
  <link rel="stylesheet" href="assets/css/dashboard.css?v=20260723a" />
</head>
<body>
  <div class="pd-app">
    <aside class="pd-sidebar">
      <div class="pd-brand"><img class="pd-brand-logo" src="assets/img/logo-white.png" alt="Megawide Construction">Planners Dashboard<small>Planning Suite</small></div>
      <nav>
        <div class="pd-navsec">Portfolio</div>
        <a href="projects.html" title="Projects"><span class="pd-navico" data-ico="grid"></span><span class="pd-navtxt">Projects</span></a>
        <a href="modules/portfolio-overview/index.html" title="Portfolio Overview"><span class="pd-navico" data-ico="barChart"></span><span class="pd-navtxt">Portfolio Overview</span></a>
        <div class="pd-navsec">Project</div>
        <a href="dashboard.html" class="active" title="Project Home"><span class="pd-navico" data-ico="home"></span><span class="pd-navtxt">Project Home<small class="pd-nav-sub" id="nav-proj">None selected</small></span></a>
        <div class="pd-navsec" id="nav-sys" style="display:none;">System</div>
        <a href="admin.html" id="nav-admin" style="display:none;" title="Admin"><span class="pd-navico" data-ico="settings"></span><span class="pd-navtxt">Admin</span></a>
      </nav>
    </aside>

    <div class="pd-content">
      <div class="pd-topbar">
        <img class="pd-topbar-mark" src="assets/img/favicon.png" alt="Megawide" />
        <!-- Project switcher -->
        <div class="pd-projsw" id="projsw">
          <button class="pd-projsw-btn" id="projsw-btn" type="button">
            <span class="pd-projsw-ic" data-ico="project" data-ico-size="20"></span>
            <span class="pd-projsw-txt"><strong id="projsw-name">Project</strong><small id="projsw-path"></small></span>
            <span class="pd-projsw-caret">▾</span>
          </button>
          <div class="pd-projsw-menu" id="projsw-menu"></div>
        </div>
        <div id="user-bar"></div>
      </div>

      <div class="pd-main">
        <!-- Project Home: module launcher for the selected project -->
        <section class="pd-tabpanel" data-panel="project">
          <div class="pd-home-head">
            <h2 id="welcome">Project Home</h2>
            <p>Select a module to begin working on this project.</p>
          </div>
          <div class="pd-module-grid" id="module-grid"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js?v=20260723a"></script>
  <script src="assets/js/auth.js?v=20260723a"></script>
  <script src="assets/js/db.js?v=20260723a"></script>
  <script src="assets/js/ui.js?v=20260723a"></script>
  <script src="assets/js/icons.js?v=20260723a"></script>
  <script>
  (function () {
    var pid = sessionStorage.getItem('pd_project');
    // No project chosen yet → go pick one first (Primavera-style entry).
    if (!pid) { location.replace('projects.html'); return; }

    var PROJ = [], WS = [], wsById = {}, curProj = null, curWs = null;

    AppAuth.requireLogin(function (user, profile) {
      UI.renderUserBar(profile);
      var first = (profile.name || profile.email || '').split(' ')[0];
      document.getElementById('welcome').textContent = first ? ('Welcome, ' + first) : 'Project Home';
      if (profile.role === 'admin' || profile.role === 'super_admin') {
        document.getElementById('nav-admin').style.display = '';
        var ns = document.getElementById('nav-sys'); if (ns) ns.style.display = '';
      }
      renderModules();
      boot();
    });

    async function boot() {
      try {
        var res = await Promise.all([PDb.getProjects(), PDb.getWorkspaces()]);
        PROJ = res[0]; WS = res[1];
      } catch (e) { /* still show cached header */ }
      WS.forEach(function (w) { wsById[w.id] = w; });
      curProj = PROJ.find(function (p) { return p.id === pid; }) || { id: pid, name: sessionStorage.getItem('pd_project_name') || pid };
      curWs = curProj.workspace_id ? wsById[curProj.workspace_id] : (sessionStorage.getItem('pd_workspace') ? wsById[sessionStorage.getItem('pd_workspace')] : null);
      renderHeader();
      renderSwitcherMenu();
    }

    function pathOf(id) {
      var names = [], cur = wsById[id];
      while (cur) { names.unshift(cur.name); cur = cur.parent_id ? wsById[cur.parent_id] : null; }
      return names;
    }
    function groupHead(p) {
      if (!p) return null;
      if (p.group_head) return p.group_head;
      var cur = p.workspace_id ? wsById[p.workspace_id] : null;
      while (cur) { if (cur.group_head) return cur.group_head; cur = cur.parent_id ? wsById[cur.parent_id] : null; }
      return null;
    }
    function renderHeader() {
      document.getElementById('projsw-name').textContent = (curProj.name || curProj.id) + ' (' + curProj.id + ')';
      var path = curWs ? pathOf(curWs.id).join(' › ') : '';
      var gh = groupHead(curProj);
      document.getElementById('projsw-path').textContent = (path || '') + (gh ? '  •  Group Head: ' + gh : '');
    }

    function renderSwitcherMenu() {
      var menu = document.getElementById('projsw-menu');
      var items = PROJ.map(function (p) {
        var w = p.workspace_id ? wsById[p.workspace_id] : null;
        return '<button data-pick="' + Fmt.esc(p.id) + '"' + (p.id === pid ? ' class="cur"' : '') + '>' +
          '<strong>' + Fmt.esc(p.name || p.id) + '</strong><small>' + Fmt.esc(p.id) + (w ? ' · ' + Fmt.esc(w.name) : '') + '</small></button>';
      }).join('');
      menu.innerHTML = '<div class="pd-projsw-menu-head">Switch project</div>' + items +
        '<a class="pd-projsw-all" href="projects.html">' + Icons.svg('arrowRight', 15) + ' All projects / selector</a>';
      menu.querySelectorAll('[data-pick]').forEach(function (b) {
        b.onclick = function () {
          var np = PROJ.find(function (x) { return x.id === b.dataset.pick; });
          sessionStorage.setItem('pd_project', np.id);
          sessionStorage.setItem('pd_project_name', np.name || np.id);
          sessionStorage.setItem('pd_workspace', np.workspace_id || '');
          location.reload();
        };
      });
      var btn = document.getElementById('projsw-btn');
      btn.onclick = function (e) { e.stopPropagation(); menu.classList.toggle('open'); };
      document.addEventListener('click', function (e) { if (!menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove('open'); });
    }

    function renderModules() {
      var grid = document.getElementById('module-grid');
      grid.innerHTML = (APP_CONFIG.MODULES || []).map(function (m) {
        if (m.enabled) {
          return '<a class="pd-module-card" href="' + m.path + '">' +
            '<div class="pd-module-icon">' + Icons.svg(m.icon, 24) + '</div>' +
            '<div class="pd-module-body"><div class="pd-module-title">' + Fmt.esc(m.name) + '</div>' +
            '<div class="pd-module-sub">Open module ' + Icons.svg('arrowRight', 14) + '</div></div></a>';
        }
        return '<div class="pd-module-card disabled">' +
          '<div class="pd-module-icon">' + Icons.svg(m.icon, 24) + '</div>' +
          '<div class="pd-module-body"><div class="pd-module-title">' + Fmt.esc(m.name) + '</div>' +
          '<div class="pd-module-sub"><span class="pd-badge-soon">In development</span></div></div></div>';
      }).join('');
    }

  })();
  </script>
</body>
</html>

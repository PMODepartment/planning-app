<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="assets/img/icon.png" />
  <script src="assets/js/theme.js?v=20260720b"></script>
  <title>Reset password · Planners Dashboard</title>
  <link rel="stylesheet" href="assets/css/dashboard.css?v=20260720b" />
</head>
<body>
  <div class="pd-auth-wrap">
    <div class="pd-auth-card">
      <div class="pd-auth-logo">
        <img class="pd-auth-mark" src="assets/img/favicon.png" alt="Megawide">
        <div class="pd-brand">Planners Dashboard</div>
        <small>Reset password</small>
      </div>
      <div class="pd-card">
        <p style="color:var(--pd-muted);margin:0 0 18px;font-size:13px;">
          Enter your company email and we'll send you a link to reset your password.
        </p>
        <form id="reset-form">
          <div class="pd-field">
            <label for="email">Email</label>
            <input class="pd-input" type="email" id="email" required autocomplete="email"
                   placeholder="yourname@megawide.com.ph" />
          </div>
          <button class="pd-btn pd-btn-primary" type="submit" id="btn" style="width:100%;justify-content:center;">Send reset link</button>
          <p id="msg" style="font-size:13px;margin:12px 0 0;"></p>
        </form>
        <p style="text-align:center;margin:16px 0 0;font-size:13px;">
          <a href="index.html">← Back to sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js?v=20260720b"></script>
  <script src="assets/js/auth.js?v=20260720b"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var msg = document.getElementById('msg');
      var btn = document.getElementById('btn');
      msg.style.color = 'var(--pd-bad)'; msg.textContent = '';
      var email = document.getElementById('email').value.trim();
      if (!email) { msg.textContent = 'Please enter your email.'; return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      // Redirect target after the user clicks the email link.
      var redirectTo = location.origin + location.pathname.replace(/forgot-password\.html$/, 'index.html');
      var { error } = await AppAuth.getSB().auth.resetPasswordForEmail(email, { redirectTo: redirectTo });
      if (error) {
        msg.textContent = error.message; btn.disabled = false; btn.textContent = 'Send reset link';
      } else {
        msg.style.color = 'var(--pd-ok)';
        msg.textContent = 'Reset link sent! Check your email inbox.';
        btn.textContent = 'Sent ✓';
      }
    });
  </script>
</body>
</html>

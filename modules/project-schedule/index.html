<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/img/icon.png" />
  <script src="../../assets/js/theme.js"></script>
  <title>Project Schedule &amp; Cost Loading · Planners Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  <style>
    /* ── Controls ───────────────────────────────────────────── */
    .ps-controls {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      margin-bottom: 16px;
    }

    /* ── KPI Cards ──────────────────────────────────────────── */
    .ps-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .ps-kpi {
      background: var(--pd-card); border: 1px solid var(--pd-border);
      border-radius: 8px; padding: 16px;
    }
    .ps-kpi-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--pd-muted); margin-bottom: 6px;
    }
    .ps-kpi-value { font-size: 24px; font-weight: 700; color: var(--pd-text); }
    .ps-kpi-sub   { font-size: 12px; color: var(--pd-muted); margin-top: 3px; }
    .ps-kpi-red   { color: #ef4444 !important; }
    .ps-kpi-green { color: #22c55e !important; }

    /* ── Tabs ───────────────────────────────────────────────── */

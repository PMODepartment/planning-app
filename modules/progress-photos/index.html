<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/img/icon.png" />
  <script src="../../assets/js/theme.js?v=20260720a"></script>
  <title>Progress Photos · Planners Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/dashboard.css?v=20260720a" />
  <link rel="stylesheet" href="module.css?v=20260720a" />
</head>
<body>
  <div class="pd-app">
    <!-- Sidebar-less shell (matches Project Schedule / Cash Flow / Drawing Register) -->
    <div class="pd-content">
      <div class="pd-topbar">
        <a class="pd-btn pp-modback" href="../../dashboard.html" title="Back to modules">
          <span data-ico="arrowLeft" data-ico-size="18"></span></a>
        <h1 class="pp-title" style="margin:0;">
          <span class="pp-title-ico" data-ico="camera" data-ico-size="20"></span>
          <span class="pp-title-txt" id="pp-screen-title">Photos Database</span>
        </h1>
        <div class="pp-projctx">
          <select class="pd-select pp-project" id="pp-project" title="Project"></select>
        </div>

        <!-- Top-level screens (the Power Apps home: View Photos / View PPRs) -->
        <div class="pp-tabs" role="tablist">
          <button class="pp-tab active" data-screen="photos">Photos</button>
          <button class="pp-tab" data-screen="ppr">PPRs</button>
        </div>

        <!-- Tool cluster beside the profile: one labelled primary action per
             screen, everything else icon-only (Drawing Register / Cash Flow). -->
        <div class="pp-topbar-tools" id="pp-topbar-tools">
          <!-- Photos-screen tools -->
          <button class="pd-btn pd-btn-primary pp-tb-labeled" id="pp-add" title="Upload photos">+ Add photos</button>
          <span class="pp-tb-sep" id="pp-sep-photos"></span>
          <button class="pd-btn" id="pp-refresh" title="Reload photos">
            <span data-ico="refresh" data-ico-size="16"></span></button>
          <!-- PPR-screen tools -->
          <button class="pd-btn pd-btn-primary pp-tb-labeled" id="ppr-new" title="Create a PPR" style="display:none;">+ New PPR</button>
          <button class="pd-btn pp-tb-labeled" id="ppr-back" title="Back to the PPR list" style="display:none;">
            <span data-ico="arrowLeft" data-ico-size="16"></span> PPR list</button>
        </div>
        <div id="user-bar"></div>
      </div>

      <div class="pd-main">
        <!-- ================= Photos Database ================= -->
        <div id="pp-screen-photos">
          <div class="pp-filters">
            <span class="pp-filt-ico" data-ico="filter" data-ico-size="15"></span>
            <input class="pd-input pp-search" id="pp-f-search" placeholder="Search description, trade, works, location…" />
            <label class="pp-datefield">Captured
              <input class="pd-input" type="date" id="pp-f-from" title="Filter by capture start" /></label>
            <label class="pp-datefield">to
              <input class="pd-input" type="date" id="pp-f-to" title="Filter by capture end" /></label>
            <select class="pd-select" id="pp-f-trade"><option value="">Filter by Trade</option></select>
            <select class="pd-select" id="pp-f-works"><option value="">Filter by Works</option></select>
            <select class="pd-select" id="pp-f-location"><option value="">Filter by Location</option></select>
            <button class="pp-clear" id="pp-clearfilters" title="Clear all filters" hidden>
              <span data-ico="x" data-ico-size="14"></span>Clear filters</button>
          </div>
          <!-- Count + display mode, using the shared .pd-viewtoggle component -->
          <div class="pp-listbar">
            <span class="pp-countbar" id="pp-count"></span>
            <div class="pd-viewtoggle" role="tablist">
              <button class="pd-vt active" data-view="list" title="List view">
                <span data-ico="listView" data-ico-size="15"></span></button>
              <button class="pd-vt" data-view="gallery" title="Gallery view">
                <span data-ico="gridView" data-ico-size="15"></span></button>
            </div>
          </div>
          <div id="pp-view"></div>
        </div>

        <!-- ================= PPR Presentations ================= -->
        <div id="pp-screen-ppr" hidden>
          <div class="pp-filters" id="ppr-listbar">
            <span class="pp-filt-ico" data-ico="filter" data-ico-size="15"></span>
            <label class="pp-datefield">PPR date
              <input class="pd-input" type="date" id="ppr-f-from" title="Filter by PPR date start" /></label>
            <label class="pp-datefield">to
              <input class="pd-input" type="date" id="ppr-f-to" title="Filter by PPR date end" /></label>
            <button class="pp-clear" id="ppr-clearfilters" title="Clear all filters" hidden>
              <span data-ico="x" data-ico-size="14"></span>Clear filters</button>
          </div>
          <div class="pp-listbar" id="ppr-countbar">
            <span class="pp-countbar" id="ppr-count"></span>
          </div>
          <div id="ppr-view"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fullscreen photo viewer (the Power Apps expand button) -->
  <div class="pp-lightbox" id="pp-lightbox" hidden>
    <button class="pp-lb-close" id="pp-lb-close" title="Close (Esc)">×</button>
    <button class="pp-lb-btn pp-lb-prev" id="pp-lb-prev" title="Previous (←)">‹</button>
    <img class="pp-lb-img" id="pp-lb-img" alt="" />
    <button class="pp-lb-btn pp-lb-next" id="pp-lb-next" title="Next (→)">›</button>
    <div class="pp-lb-cap" id="pp-lb-cap"></div>
  </div>

  <!-- Existing "Works" values, offered as suggestions in the add/edit modals -->
  <datalist id="pp-works-list"></datalist>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/config.js?v=20260720a"></script>
  <script src="../../assets/js/auth.js?v=20260720a"></script>
  <script src="../../assets/js/db.js?v=20260720a"></script>
  <script src="../../assets/js/ui.js?v=20260720a"></script>
  <script src="../../assets/js/icons.js?v=20260720a"></script>
  <script src="module.js?v=20260720a"></script>
  <script src="ppr.js?v=20260720a"></script>
  <script>
    AppAuth.requireLogin(function (user, profile) {
      UI.renderUserBar(profile);
      ProgressPhotos.init(user, profile);
      PPR.init(user, profile);

      document.getElementById('pp-lb-close').onclick = ProgressPhotos._closeLightbox;
      document.getElementById('pp-lb-prev').onclick  = function () { ProgressPhotos._stepLightbox(-1); };
      document.getElementById('pp-lb-next').onclick  = function () { ProgressPhotos._stepLightbox(1); };

      // Top-level screen switch (Photos / PPRs) — each screen owns its own tools.
      var PHOTO_TOOLS = ['pp-add', 'pp-sep-photos', 'pp-refresh'];
      function show(ids, on) {
        ids.forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.style.display = on ? '' : 'none';
        });
      }
      function setScreen(s) {
        var isPpr = s === 'ppr';
        document.getElementById('pp-screen-photos').hidden = isPpr;
        document.getElementById('pp-screen-ppr').hidden = !isPpr;
        document.getElementById('pp-screen-title').textContent =
          isPpr ? 'PPR Presentations' : 'Photos Database';
        show(PHOTO_TOOLS, !isPpr);
        // Each module re-asserts its own tools' visibility (role + inner screen).
        PPR._syncTools(isPpr);
        if (!isPpr) ProgressPhotos._syncChrome();
        Array.prototype.forEach.call(document.querySelectorAll('.pp-tab[data-screen]'), function (b) {
          b.classList.toggle('active', b.dataset.screen === s);
        });
        try { localStorage.setItem('pp_screen', s); } catch (e) {}
      }
      Array.prototype.forEach.call(document.querySelectorAll('.pp-tab[data-screen]'), function (b) {
        b.onclick = function () { setScreen(b.dataset.screen); };
      });
      var saved = 'photos';
      try { saved = localStorage.getItem('pp_screen') || 'photos'; } catch (e) {}
      setScreen(saved === 'ppr' ? 'ppr' : 'photos');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/img/icon.png" />
  <script src="../../assets/js/theme.js?v=20260720b"></script>
  <title>Risk Register · Planners Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/dashboard.css?v=20260720b" />
  <link rel="stylesheet" href="module.css?v=20260720b" />
</head>
<body>
  <div class="pd-app">
    <!-- Sidebar-less shell (uniform across the suite) -->
    <div class="pd-content">
      <div class="pd-topbar">
        <a class="pd-btn rr-modback" href="../../dashboard.html" title="Back to modules">
          <span data-ico="arrowLeft" data-ico-size="18"></span></a>
        <h1 class="rr-title" style="margin:0;">
          <span class="rr-title-ico" data-ico="risk" data-ico-size="20"></span>
          <span class="rr-title-txt">Risk Register</span>
        </h1>
        <div class="rr-projctx">
          <select class="pd-select rr-project" id="rr-project" title="Project"></select>
        </div>
        <div class="rr-tabs" role="tablist">
          <button class="rr-tab active" data-view="list">Register</button>
          <button class="rr-tab" data-view="matrix">Risk Matrix</button>
        </div>
        <div class="rr-topbar-tools">
          <button class="pd-btn pd-btn-primary rr-tb-labeled" id="rr-add" title="Add a risk">+ Add risk</button>
        </div>
        <div id="user-bar"></div>
      </div>
      <div class="pd-main">
        <!-- Filters -->
        <div class="rr-filters">
          <span class="rr-filt-ico" data-ico="filter" data-ico-size="15"></span>
          <select class="pd-select" id="rr-f-status" style="max-width:150px;">
            <option value="">All statuses</option>
            <option>Open</option><option>In Progress</option><option>Closed</option>
          </select>
          <select class="pd-select" id="rr-f-category" style="max-width:170px;"><option value="">All categories</option></select>
          <input class="pd-input rr-search" id="rr-f-search" placeholder="Search…" />
        </div>

        <!-- KPIs -->
        <div class="rr-kpis" id="rr-kpis"></div>

        <!-- List view -->
        <div id="rr-view-list">
          <div class="pd-card" style="padding:0;overflow:auto;">
            <table class="pd-table rr-table" id="rr-table"></table>
          </div>
        </div>

        <!-- Matrix view -->
        <div id="rr-view-matrix" style="display:none;">
          <div class="pd-card">
            <h2 style="margin-top:0;">5 × 5 Risk Matrix</h2>
            <p style="color:var(--pd-muted);margin-top:0;">Count of risks per Likelihood × Impact. Click a cell to filter the register.</p>
            <div id="rr-matrix"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/config.js?v=20260720b"></script>
  <script src="../../assets/js/auth.js?v=20260720b"></script>
  <script src="../../assets/js/db.js?v=20260720b"></script>
  <script src="../../assets/js/ui.js?v=20260720b"></script>
  <script src="../../assets/js/icons.js?v=20260720b"></script>
  <script src="module.js?v=20260720b"></script>
  <script>
    AppAuth.requireLogin(function (user, profile) {
      UI.renderUserBar(profile);
      RiskRegister.init(user, profile);
    });
  </script>
</body>
</html>

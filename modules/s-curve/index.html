<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/img/icon.png" />
  <script src="../../assets/js/theme.js?v=20260717f"></script>
  <title>Project S-Curve · Planners Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/dashboard.css?v=20260717f" />
  <style>
    /* sidebar-less shell (matches Cash Flow / Project Schedule) */
    .sc-modback { width:36px; height:36px; padding:0; display:inline-flex; align-items:center; justify-content:center; margin-right:6px; }
    .pd-topbar #user-bar { margin-left:auto; }
    .sc-controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:16px; }
    .sc-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
    .sc-kpi { background:var(--pd-card); border:1px solid var(--pd-line); border-radius:8px; padding:14px 16px; }
    .sc-kpi-l { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--pd-muted); margin-bottom:5px; }
    .sc-kpi-v { font-size:22px; font-weight:700; } .sc-kpi-s { font-size:12px; color:var(--pd-muted); margin-top:2px; }
    .sc-ok { color:var(--pd-ok); } .sc-bad { color:var(--pd-bad); }
    .sc-card { background:var(--pd-card); border:1px solid var(--pd-line); border-radius:var(--pd-radius); padding:16px; margin-bottom:18px; }
    .sc-card h3 { margin:0 0 12px; font-size:15px; }
    .sc-svg { width:100%; height:auto; display:block; }
    .sc-grid { stroke:var(--pd-line); stroke-width:1; }
    .sc-ylab { fill:var(--pd-muted); font-size:11px; text-anchor:end; }
    .sc-xlab { fill:var(--pd-muted); font-size:11px; text-anchor:middle; }
    .sc-planned { fill:none; stroke:var(--pd-dark); stroke-width:2; }
    html.pd-dark .sc-planned { stroke:#c7ccd1; }
    .sc-earned { fill:none; stroke:var(--pd-red); stroke-width:2.5; }
    .sc-today { stroke:var(--pd-red); stroke-width:1.5; stroke-dasharray:4 3; }
    .sc-today-lab { fill:var(--pd-red); font-size:10px; font-weight:700; }
    .sc-forecast { fill:none; stroke:var(--pd-red); stroke-width:2; stroke-dasharray:7 5; }
    .sw-forecast { width:18px; height:0; border-top:2px dashed var(--pd-red); }
    .sc-legend { display:flex; flex-wrap:wrap; gap:18px; margin-top:12px; font-size:12px; color:var(--pd-muted); }
    .sc-lg { display:inline-flex; align-items:center; }
    .sw { display:inline-block; width:18px; height:3px; margin-right:6px; }
    .sw-planned { background:var(--pd-dark); } html.pd-dark .sw-planned { background:#c7ccd1; }
    .sw-earned { background:var(--pd-red); } .sw-today { background:var(--pd-red); width:3px; height:12px; }
    .sc-empty { text-align:center; padding:40px; color:var(--pd-muted); }
    .sc-table { width:100%; border-collapse:collapse; font-size:13px; }
    .sc-table th { background:var(--pd-bg); padding:8px 12px; text-align:right; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--pd-muted); border-bottom:2px solid var(--pd-line); }
    .sc-table th, .sc-table td { white-space:nowrap; }
    .sc-table th:first-child, .sc-table td:first-child { text-align:left; position:sticky; left:0; z-index:1; font-weight:700; }
    .sc-table td:first-child { background:var(--pd-card); }
    .sc-table th:first-child { background:var(--pd-bg); }
    .sc-table td { padding:7px 12px; border-bottom:1px solid var(--pd-line); text-align:right; }
    .sc-note { font-size:12px; color:var(--pd-muted); margin-top:8px; }
    .sc-loading { position:fixed; inset:0; background:rgba(20,20,20,.4); display:flex; align-items:center; justify-content:center; gap:12px; z-index:999; color:#fff; font-weight:600; }
    .sc-spin { width:36px; height:36px; border:4px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:sc-spin .8s linear infinite; }
    @keyframes sc-spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="pd-app">
  <!-- Sidebar removed (matches Cash Flow / Project Schedule): the back button returns to the module selector. -->
  <div class="pd-content">
    <div class="pd-topbar">
      <a class="pd-btn sc-modback" href="../../dashboard.html" title="Back to modules"><span data-ico="arrowLeft" data-ico-size="18"></span></a>
      <h1 style="margin:0;">Project S-Curve</h1>
      <div id="user-bar"></div>
    </div>
    <div class="pd-main">
      <div class="sc-controls">
        <select class="pd-select" id="sc-project" style="max-width:340px;"></select>
        <button class="pd-btn" id="sc-refresh"><span data-ico="refresh" data-ico-size="15"></span> Refresh</button>
        <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--pd-muted);">Forecast finish <input class="pd-input" type="date" id="sc-forecast" style="max-width:160px;" title="Forecast completion date — sets the end of the red dashed forecast line" /></label>
        <button class="pd-btn" id="sc-tabletoggle" style="margin-left:auto;"><span data-ico="listView" data-ico-size="15"></span> Show data table</button>
      </div>
      <div class="sc-kpis" id="sc-kpis"></div>
      <div class="sc-card">
        <h3>Project S-Curve — Planned vs Actual (cumulative %)</h3>
        <div id="sc-chart"></div>
        <p class="sc-note" id="sc-basis"></p>
      </div>
      <div class="sc-card" id="sc-tablecard" style="padding:0;overflow:hidden;display:none;">
        <div style="overflow-x:auto;" id="sc-tablewrap"></div>
      </div>
    </div>
  </div>
</div>
<div class="sc-loading" id="sc-loading" style="display:none;"><div class="sc-spin"></div><span>Loading schedule…</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../assets/js/config.js?v=20260717f"></script>
<script src="../../assets/js/auth.js?v=20260717f"></script>
<script src="../../assets/js/db.js?v=20260717f"></script>
<script src="../../assets/js/ui.js?v=20260717f"></script>
<script src="../../assets/js/icons.js?v=20260717f"></script>
<script>
(function () {
  'use strict';
  var TABLE = 'project_schedule', pid = null, rows = [], forecastFinish = null, fcManual = false;
  function sb() { return AppAuth.getSB(); }
  function pd(v) { if (!v) return null; var m = String(v).match(/(\d{4})-(\d{2})-(\d{2})/); if (!m) return null; return new Date(+m[1], +m[2]-1, +m[3]); }
  function today() { var t = new Date(); return new Date(t.getFullYear(), t.getMonth(), t.getDate()); }
  function iso(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  function fcKey() { return 'sc_fc_' + pid; }
  function plannedFinishDate() { var mx = null; rows.forEach(function (a) { if (a.activity_type === 'WBS Summary') return; var e = pd(a.end_date); if (e && (!mx || e > mx)) mx = e; }); return mx; }
  function esc(s) { return Fmt.esc(s); }
  function isWbs(r) { return r.activity_type === 'WBS Summary'; }
  function showLoading() { var e = document.getElementById('sc-loading'); if (e) e.style.display = 'flex'; }
  function hideLoading() { var e = document.getElementById('sc-loading'); if (e) e.style.display = 'none'; }

  async function loadProjects() {
    var projects = await PDb.getProjects();
    var sel = document.getElementById('sc-project');
    pid = sessionStorage.getItem('pd_project') || (projects[0] && projects[0].id) || null;
    sel.innerHTML = '<option value="">— Select project —</option>' + projects.map(function (p) {
      return '<option value="' + esc(p.id) + '"' + (p.id === pid ? ' selected' : '') + '>' + esc(p.name || p.id) + '</option>';
    }).join('');
    if (pid) load();
  }
  async function load() {
    if (!pid) { rows = []; render(); return; }
    showLoading();
    var all = [];
    try {
      var cnt = await sb().from(TABLE).select('*', { count: 'exact', head: true }).eq('project_id', pid);
      var total = (cnt && cnt.count) || 0;
      if (total > 0) {
        var pages = Math.ceil(total / 1000), reqs = [];
        for (var p = 0; p < pages; p++) reqs.push(sb().from(TABLE).select('*').eq('project_id', pid).range(p * 1000, p * 1000 + 999));
        var res = await Promise.all(reqs);
        for (var i = 0; i < res.length; i++) { if (res[i].error) throw res[i].error; all = all.concat(res[i].data || []); }
      } else {
        var from = 0;
        while (true) { var r1 = await sb().from(TABLE).select('*').eq('project_id', pid).range(from, from + 999); if (r1.error) throw r1.error; all = all.concat(r1.data || []); if ((r1.data || []).length < 1000) break; from += 1000; }
      }
    } catch (e) { hideLoading(); UI.toast('Load failed: ' + (e.message || e), 'error'); return; }
    hideLoading(); rows = all;
    // Forecast finish is performance-based (auto) unless the user has pinned a date for this
    // project; a saved value = manual override. The input is filled in render() with the
    // effective date (auto or manual) once the SPI-based projection is computed.
    var saved = null; try { var sv = localStorage.getItem(fcKey()); if (sv) saved = pd(sv); } catch (e) {}
    fcManual = !!saved; forecastFinish = saved || null;
    render();
  }

  // Schedule progress S-curve (duration-weighted). Cost / earned-value (EVM) is
  // intentionally out of scope here — a separate team owns the EVM dashboard.
  function compute() {
    var leaves = rows.filter(function (r) { return !isWbs(r); });
    if (!leaves.length) return { empty: true };
    function val(a) { if (a.duration_days) return a.duration_days; var s = pd(a.start_date), e = pd(a.end_date); if (s && e) return (e - s) / 86400000 + 1; return 1; }
    function done(a) { return val(a) * (Math.max(0, Math.min(100, a.percent_complete || 0)) / 100); }
    var TOT = leaves.reduce(function (s, a) { return s + val(a); }, 0);
    var ds = [], de = [];
    leaves.forEach(function (a) { var s = pd(a.start_date), e = pd(a.end_date); if (s) ds.push(+s); if (e) de.push(+e); });
    if (!ds.length) return { empty: true };
    var min = new Date(Math.min.apply(null, ds)), max = new Date(Math.max.apply(null, de.length ? de : ds));
    var plannedEnd = max;
    var tnow = today();
    // Performance-based (SPI) forecast finish: project the current pace forward.
    // SPI = actual% ÷ planned% at the data date; the remaining planned duration is stretched
    // by 1/SPI, so a behind-schedule project (SPI<1) forecasts a LATER finish (and vice-versa).
    // A user-pinned date overrides. The timeline extends to cover whichever is later.
    var overallDone = leaves.reduce(function (s, a) { return s + done(a); }, 0);
    function plannedValueAt(D) { var pv = 0; leaves.forEach(function (a) { var s = pd(a.start_date), e = pd(a.end_date) || s; if (!s) return; var pf = D >= e ? 1 : (D < s ? 0 : (e > s ? (D - s) / (e - s) : 1)); pv += val(a) * pf; }); return pv; }
    var pctNow = TOT ? overallDone / TOT * 100 : 0;
    var plPctNow = TOT ? plannedValueAt(tnow) / TOT * 100 : 0;
    var spi = plPctNow > 0 ? pctNow / plPctNow : 1;
    spi = Math.max(0.1, Math.min(spi, 3));   // clamp so a near-zero planned% can't explode the date
    var remMs = Math.max(0, +plannedEnd - +tnow);
    var autoFc = pctNow >= 100 ? tnow : new Date(+tnow + remMs / spi);
    var fc = (fcManual && forecastFinish) ? forecastFinish : autoFc;
    var domainMax = new Date(Math.max(+max, +tnow, +fc));
    var months = [], c = new Date(min.getFullYear(), min.getMonth(), 1);
    while (c <= domainMax) { months.push(new Date(c)); c = new Date(c.getFullYear(), c.getMonth() + 1, 1); }
    var plannedC = [], actualC = [];
    months.forEach(function (m) {
      var mEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
      var pv = 0, av = 0;
      leaves.forEach(function (a) {
        var s = pd(a.start_date), e = pd(a.end_date) || s; if (!s) return;
        var pf = mEnd >= e ? 1 : (mEnd < s ? 0 : (e > s ? (mEnd - s) / (e - s) : 1));
        pv += val(a) * pf;
        // Actual accrues for months that have fully ended (before the data date).
        if (mEnd < tnow) {
          var aS = pd(a.actual_start || a.start_date);
          var aE = pd(a.actual_finish) || pd(a.end_date) || aS;
          if (aS) { var af = mEnd >= aE ? 1 : (mEnd < aS ? 0 : (aE > aS ? (mEnd - aS) / (aE - aS) : 1)); av += done(a) * af; }
        }
      });
      plannedC.push(pv); actualC.push(av);
    });
    var ti = -1;
    for (var i = 0; i < months.length; i++) { var me = new Date(months[i].getFullYear(), months[i].getMonth() + 1, 0); if (me >= tnow) { ti = i; break; } }
    if (ti < 0) ti = months.length - 1;
    // Anchor the actual curve at the data date to the true overall % complete, so
    // the partial current month doesn't read 0 (which made the line drop to zero).
    actualC[ti] = overallDone;
    for (var k = ti + 1; k < actualC.length; k++) actualC[k] = 0;  // no actuals past the data date
    var plannedPct = TOT ? plannedC[ti] / TOT * 100 : 0, actualPct = TOT ? actualC[ti] / TOT * 100 : 0;
    var overallPct = TOT ? overallDone / TOT * 100 : 0;
    return { empty: false, months: months, plannedC: plannedC, actualC: actualC, TOT: TOT, plannedPct: plannedPct, actualPct: actualPct, overallPct: overallPct, variance: actualPct - plannedPct, ti: ti, activities: leaves.length, plannedEnd: plannedEnd, fcFinish: fc, autoFc: autoFc, spi: spi, manual: fcManual };
  }

  function render() {
    var d = compute(); renderKpis(d); renderChart(d); renderTable(d);
    // reflect the effective forecast finish (auto SPI-based, or the manual override) in the input
    var fi = document.getElementById('sc-forecast'); if (fi && !d.empty && d.fcFinish) fi.value = iso(d.fcFinish);
  }

  function renderKpis(d) {
    var host = document.getElementById('sc-kpis');
    if (d.empty) { host.innerHTML = ''; return; }
    function k(l, v, sub, cls) { return '<div class="sc-kpi"><div class="sc-kpi-l">' + l + '</div><div class="sc-kpi-v ' + (cls || '') + '">' + v + '</div>' + (sub ? '<div class="sc-kpi-s">' + sub + '</div>' : '') + '</div>'; }
    var r1 = function (x) { return Math.round(x * 10) / 10; };
    var v = r1(d.variance);
    host.innerHTML =
      k('Overall Progress', r1(d.overallPct) + '%', d.activities + ' activities') +
      k('Planned to date', r1(d.plannedPct) + '%', 'Where the plan says we should be') +
      k('Actual to date', r1(d.actualPct) + '%', 'Physical progress achieved') +
      k('Schedule Variance', (v > 0 ? '+' : '') + v + ' pp', v >= 0 ? 'On / ahead of plan' : 'Behind plan', v >= 0 ? 'sc-ok' : 'sc-bad');
  }

  function renderChart(d) {
    var host = document.getElementById('sc-chart');
    var basis = document.getElementById('sc-basis');
    if (d.empty) { host.innerHTML = '<div class="sc-empty">' + (pid ? 'This project has no dated activities. Import or add a schedule first.' : 'Select a project.') + '</div>'; basis.textContent = ''; return; }
    basis.textContent = 'Progress weighted by activity duration across ' + d.activities + ' activities. Solid = planned & actual (to data date). Red dashed = forecast to finish — ' +
      (d.manual ? 'pinned to ' + iso(d.fcFinish) : 'performance-based (SPI ' + (Math.round(d.spi * 100) / 100) + ', auto finish ' + iso(d.autoFc) + ')') +
      '; it follows the plan’s shape from the actual point up to 100%. Set a date to override, clear it to auto-forecast.';
    var W = 1000, H = 340, padL = 40, padR = 16, padT = 16, padB = 40, n = d.months.length, maxV = d.TOT || 1;
    function x(i) { return padL + (n <= 1 ? 0 : (i / (n - 1)) * (W - padL - padR)); }
    function y(v) { return padT + (1 - (v / maxV)) * (H - padT - padB); }
    var grid = '';
    [0, .25, .5, .75, 1].forEach(function (p) { var yy = y(maxV * p); grid += '<line x1="' + padL + '" y1="' + yy + '" x2="' + (W - padR) + '" y2="' + yy + '" class="sc-grid"/><text x="' + (padL - 6) + '" y="' + (yy + 3) + '" class="sc-ylab">' + Math.round(p * 100) + '%</text>'; });
    var xlab = '';
    d.months.forEach(function (mo, i) { if (mo.getMonth() === 0 || i === 0) xlab += '<text x="' + x(i) + '" y="' + (H - padB + 16) + '" class="sc-xlab">' + mo.getFullYear() + '</text>'; });
    var pl = d.plannedC.map(function (v, i) { return x(i) + ',' + y(v); }).join(' ');
    var ac = []; d.actualC.forEach(function (v, i) { if (i <= d.ti) ac.push(x(i) + ',' + y(v)); });
    // Forecast to finish: red dashed line from the actual point at the data date
    // up to 100% at the manual forecast-finish date (mapped precisely on the axis).
    function xAt(D) {
      var m0 = d.months[0];
      var fi = (D.getFullYear() - m0.getFullYear()) * 12 + (D.getMonth() - m0.getMonth()) + (D.getDate() - 1) / new Date(D.getFullYear(), D.getMonth() + 1, 0).getDate();
      fi = Math.max(0, Math.min(n - 1, fi));
      return padL + (n <= 1 ? 0 : fi / (n - 1) * (W - padL - padR));
    }
    // Forecast to finish: an S-CURVE (not a straight line) following the SHAPE of the remaining
    // planned work, time-stretched to the (SPI-based) forecast finish and scaled from the actual%
    // at the data date up to 100%. So it starts on the actual point and mirrors the plan's ramp.
    var fc = '';
    if (d.fcFinish && d.actualC[d.ti] < d.TOT) {
      var dd = today(), rem = d.TOT - d.plannedC[d.ti];
      var plSpan = +d.plannedEnd - +dd, fcSpan = +d.fcFinish - +dd;
      var pts = [x(d.ti) + ',' + y(d.actualC[d.ti])];
      if (rem > 0.0001 && plSpan > 0 && fcSpan > 0) {
        for (var j = d.ti + 1; j < d.months.length; j++) {
          var mDate = d.months[j]; if (mDate > d.plannedEnd) break;   // month first-of, matches x(j)
          var timeFrac = Math.min(1, (+mDate - +dd) / plSpan);
          var valFrac = Math.min(1, Math.max(0, (d.plannedC[j] - d.plannedC[d.ti]) / rem));
          var fdate = new Date(+dd + timeFrac * fcSpan);
          pts.push(xAt(fdate) + ',' + y(d.actualC[d.ti] + valFrac * (d.TOT - d.actualC[d.ti])));
        }
      }
      pts.push(xAt(d.fcFinish) + ',' + y(d.TOT));   // land exactly on 100% at the forecast finish
      fc = '<polyline class="sc-forecast" points="' + pts.join(' ') + '"/>';
    }
    var tx = x(d.ti);
    var todayL = '<line x1="' + tx + '" y1="' + padT + '" x2="' + tx + '" y2="' + (H - padB) + '" class="sc-today"/><text x="' + (tx + 4) + '" y="' + (padT + 10) + '" class="sc-today-lab">Data date</text>';
    host.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" class="sc-svg">' + grid + todayL +
      '<polyline class="sc-planned" points="' + pl + '"/>' + fc + (ac.length ? '<polyline class="sc-earned" points="' + ac.join(' ') + '"/>' : '') + xlab + '</svg>' +
      '<div class="sc-legend"><span class="sc-lg"><span class="sw sw-planned"></span> Planned progress</span><span class="sc-lg"><span class="sw sw-earned"></span> Actual progress</span><span class="sc-lg"><span class="sw sw-forecast"></span> Forecast to finish</span><span class="sc-lg"><span class="sw sw-today"></span> Data date (today)</span></div>';
  }

  function renderTable(d) {
    var wrap = document.getElementById('sc-tablewrap');
    if (!wrap) return;
    if (d.empty) { wrap.innerHTML = '<div class="sc-empty">No data.</div>'; return; }
    var MABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    // Transposed: months across the top, one row each for Planned & Actual POC.
    var head = '<th>POC</th>' + d.months.map(function (mo) {
      return '<th>' + MABBR[mo.getMonth()] + " '" + String(mo.getFullYear()).slice(2) + '</th>';
    }).join('');
    var planned = '<td>Planned %</td>' + d.months.map(function (mo, i) {
      var p = d.TOT ? Math.round(d.plannedC[i] / d.TOT * 1000) / 10 : 0;
      return '<td>' + p + '%</td>';
    }).join('');
    var actual = '<td>Actual %</td>' + d.months.map(function (mo, i) {
      var a = (i <= d.ti && d.TOT) ? Math.round(d.actualC[i] / d.TOT * 1000) / 10 : null;
      return '<td>' + (a != null ? a + '%' : '—') + '</td>';
    }).join('');
    wrap.innerHTML = '<table class="sc-table"><thead><tr>' + head + '</tr></thead><tbody><tr>' + planned + '</tr><tr>' + actual + '</tr></tbody></table>';
  }

  AppAuth.requireLogin(function (user, profile) {
    UI.renderUserBar(profile);
    UI.initShell();
    document.getElementById('sc-project').onchange = function (e) { pid = e.target.value || null; if (pid) sessionStorage.setItem('pd_project', pid); load(); };
    document.getElementById('sc-refresh').onclick = function () { load(); };
    document.getElementById('sc-forecast').onchange = function (e) {
      var v = e.target.value;
      // Set a date to pin (override) the forecast finish; clear it to revert to the auto SPI forecast.
      if (v) { fcManual = true; forecastFinish = pd(v); } else { fcManual = false; forecastFinish = null; }
      try { if (v) localStorage.setItem(fcKey(), v); else localStorage.removeItem(fcKey()); } catch (er) {}
      render();
    };
    document.getElementById('sc-tabletoggle').onclick = function () {
      var card = document.getElementById('sc-tablecard');
      var show = card.style.display === 'none';
      card.style.display = show ? '' : 'none';
      this.innerHTML = '<span data-ico="listView" data-ico-size="15"></span> ' + (show ? 'Hide data table' : 'Show data table');
      if (window.Icons) Icons.hydrate(this);
    };
    loadProjects();
  });
})();
</script>
</body>
</html>

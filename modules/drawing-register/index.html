<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/img/icon.png" />
  <script src="../../assets/js/theme.js?v=20260716"></script>
  <title>Drawing Register · Planners Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/dashboard.css?v=20260716" />
  <link rel="stylesheet" href="module.css?v=20260716i" />
</head>
<body>
  <div class="pd-app">
    <!-- Sidebar removed (matches Project Schedule / Cash Flow): the back button returns to the module selector. -->
    <div class="pd-content">
      <div class="pd-topbar">
        <a class="pd-btn dr-modback" href="../../dashboard.html" title="Back to modules"><span data-ico="arrowLeft" data-ico-size="18"></span></a>
        <h1 style="margin:0;"><span class="dr-title-ico" data-ico="ruler" data-ico-size="20"></span> Drawing Register &amp; Tracker</h1>
        <div id="user-bar"></div>
      </div>
      <div class="pd-main">
        <div class="dr-toolbar">
          <div class="dr-toolbar-row">
            <select class="pd-select dr-project" id="dr-project"></select>
            <div class="dr-tabs">
              <button class="dr-tab active" data-view="register">Register</button>
              <button class="dr-tab" data-view="progress">Progress</button>
            </div>
            <div class="dr-actions">
              <div class="dr-menuwrap">
                <button class="pd-btn" id="dr-addlevel" style="display:none;">+ Level ▾</button>
                <div class="dr-menu" id="dr-addlevel-menu" hidden>
                  <button data-add="phase">Phase</button>
                  <button data-add="discipline">Discipline</button>
                  <button data-add="category">Category</button>
                </div>
              </div>
              <button class="pd-btn pd-btn-primary" id="dr-add">+ Add drawing</button>
              <span class="dr-actsep"></span>
              <button class="pd-btn" id="dr-import">Import Excel</button>
              <button class="pd-btn" id="dr-export">Export</button>
              <button class="pd-btn dr-clearbtn" id="dr-clear" style="display:none;">Clear all</button>
            </div>
          </div>
          <div class="dr-toolbar-row dr-filters">
            <input class="pd-input dr-search" id="dr-f-search" placeholder="Search code, title, description…" />
            <select class="pd-select" id="dr-f-phase"><option value="">All phases</option></select>
            <select class="pd-select" id="dr-f-discipline"><option value="">All disciplines</option></select>
            <select class="pd-select" id="dr-f-status">
              <option value="">All statuses</option>
              <option>For Review</option><option>Revise &amp; Resubmit</option>
              <option>Approved w/ comments</option><option>Approved w/o comments</option>
              <option>Approved</option><option>Superseded</option>
            </select>
          </div>
        </div>

        <div id="dr-view"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../../assets/js/config.js?v=20260716"></script>
  <script src="../../assets/js/auth.js?v=20260716"></script>
  <script src="../../assets/js/db.js?v=20260716"></script>
  <script src="../../assets/js/ui.js?v=20260716"></script>
  <script src="../../assets/js/icons.js?v=20260716"></script>
  <script src="module.js?v=20260716i"></script>
  <script>
    AppAuth.requireLogin(function (user, profile) {
      UI.renderUserBar(profile);
      DrawingRegister.init(user, profile);
    });
  </script>
</body>
</html>

  <style>
    .cf-controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
    .cf-src { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; font-size:12px; }
    .cf-chip { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; border:1px solid var(--pd-line); background:var(--pd-card); color:var(--pd-muted); }
    .cf-chip .dot { width:8px; height:8px; border-radius:50%; background:var(--pd-line); }
    .cf-chip.ok .dot { background:var(--pd-ok); } .cf-chip.ok { color:var(--pd-ink); }
    .cf-chip.warn .dot { background:#d99100; } .cf-chip.warn { color:var(--pd-ink); }
    .cf-chip.bad .dot { background:var(--pd-bad); }

    .cf-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:18px; }
    .cf-kpi { background:var(--pd-card); border:1px solid var(--pd-line); border-radius:8px; padding:14px 16px; }
    .cf-kpi-l { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--pd-muted); margin-bottom:5px; }
    .cf-kpi-v { font-size:20px; font-weight:700; }
    .cf-kpi-s { font-size:11px; color:var(--pd-muted); margin-top:3px; }
    .cf-ok { color:var(--pd-ok); } .cf-bad { color:var(--pd-bad); }

    .cf-card { background:var(--pd-card); border:1px solid var(--pd-line); border-radius:var(--pd-radius); padding:16px; margin-bottom:18px; }
    .cf-card h3 { margin:0 0 4px; font-size:15px; }
    .cf-card .sub { font-size:12px; color:var(--pd-muted); margin:0 0 12px; }
    .cf-svg { width:100%; height:auto; display:block; }
    .cf-grid { stroke:var(--pd-line); stroke-width:1; }
    .cf-zero { stroke:var(--pd-muted); stroke-width:1; stroke-dasharray:3 3; }
    .cf-ylab { fill:var(--pd-muted); font-size:10.5px; text-anchor:end; }
    .cf-xlab { fill:var(--pd-muted); font-size:10.5px; text-anchor:middle; }
    .cf-legend { display:flex; flex-wrap:wrap; gap:16px; margin-top:10px; font-size:12px; color:var(--pd-muted); }
    .cf-lg { display:inline-flex; align-items:center; }
    .sw { display:inline-block; width:14px; height:10px; margin-right:6px; border-radius:2px; }
    .sw.fc { opacity:.4; }
    .sw-line { width:18px; height:0; border-top:3px solid; margin-right:6px; }
    .cf-chart-wrap { position:relative; }
    .cf-tip { position:absolute; pointer-events:none; background:var(--pd-dark); color:#fff; padding:8px 10px; border-radius:6px; font-size:11.5px; line-height:1.5; box-shadow:0 6px 20px rgba(0,0,0,.35); opacity:0; transition:opacity .08s; white-space:nowrap; z-index:5; }
    .cf-tip b { font-weight:700; }
    .cf-tip .r { color:#ff9b91; } .cf-tip .g { color:#8ee0ac; }
    .cf-tip-hd { font-weight:700; margin-bottom:3px; border-bottom:1px solid rgba(255,255,255,.18); padding-bottom:3px; }
    .cf-hover { fill:transparent; cursor:pointer; }
    .cf-hover:hover { fill:rgba(127,127,127,.10); }
    .cf-seg { display:inline-flex; border:1px solid var(--pd-line); border-radius:6px; overflow:hidden; }
    .cf-seg button { padding:4px 12px; font-size:12px; border:0; background:var(--pd-card); color:var(--pd-muted); cursor:pointer; }
    .cf-seg button.active { background:var(--pd-red); color:#fff; }
    .cf-chart-head { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .cf-dlab { fill:var(--pd-muted); font-size:9px; text-anchor:middle; }
    .cf-axis { stroke:var(--pd-muted); stroke-width:1; }
    .cf-selband { fill:rgba(238,49,36,0.12); stroke:var(--pd-red); stroke-width:1; stroke-dasharray:3 2; }
    .cf-matrix th.mcol { cursor:pointer; }
    .cf-matrix th.mcol:hover { color:var(--pd-red); }
    .cf-matrix th.mcol.sel { background:var(--pd-red); color:#fff; }
    .cf-empty { text-align:center; padding:40px; color:var(--pd-muted); }

    /* projection matrix */
    .cf-matrix-wrap { overflow-x:auto; }
    .cf-matrix { border-collapse:collapse; font-size:12px; white-space:nowrap; min-width:100%; }
    .cf-matrix th, .cf-matrix td { padding:6px 10px; border-bottom:1px solid var(--pd-line); text-align:right; }
    .cf-matrix thead th { position:sticky; top:0; background:var(--pd-bg); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--pd-muted); border-bottom:2px solid var(--pd-line); }
    .cf-matrix th.lbl, .cf-matrix td.lbl { text-align:left; position:sticky; left:0; background:var(--pd-card); z-index:1; min-width:200px; }
    .cf-matrix thead th.lbl { background:var(--pd-bg); z-index:2; }
    .cf-sec td, .cf-sec th { background:var(--pd-red-light); font-weight:700; color:var(--pd-ink); }
    .cf-sec td.lbl, .cf-sec th.lbl { background:var(--pd-red-light); }
    .cf-cum td, .cf-cum { font-weight:600; }
    .cf-cum td:not(.lbl) { border-top:1px solid var(--pd-line); }
    .cf-neg { color:var(--pd-bad); }
    .cf-net td { font-weight:700; }
    .cf-net td, .cf-net th { background:var(--pd-dark); color:#fff; }
    .cf-net td.lbl, .cf-net th.lbl { background:var(--pd-dark); color:#fff; }
    .cf-sub td:first-child { padding-left:22px; }

    .cf-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .cf-form-full { grid-column:1 / -1; }
    .cf-btn-sm { padding:3px 9px; font-size:11px; border-radius:5px; border:1px solid var(--pd-line); background:var(--pd-card); color:var(--pd-ink); cursor:pointer; }
    .cf-btn-sm:hover { border-color:var(--pd-red); color:var(--pd-red); }
    .cf-dp-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
    .cf-dp-row { display:grid; grid-template-columns:1.3fr 1fr 1fr 0.9fr 1.1fr 1.2fr 1fr auto; gap:6px; align-items:center; margin-bottom:6px; }
    .cf-dp-row .pd-input, .cf-dp-row .pd-select { padding:5px 7px; font-size:12px; }
    .cf-dp-amt { font-size:11px; font-weight:600; color:var(--pd-muted); text-align:right; white-space:nowrap; }
    #cf-dp-sum { color:var(--pd-ink); }
    .cf-hint { font-size:11px; color:var(--pd-muted); margin-top:3px; }
    .cf-tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--pd-line); }
    .cf-tab { padding:8px 14px; font-size:13px; font-weight:600; color:var(--pd-muted); cursor:pointer; border-bottom:2px solid transparent; }
    .cf-tab.active { color:var(--pd-red); border-bottom-color:var(--pd-red); }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="../../assets/js/config.js?v=20260714"></script>
<script src="../../assets/js/auth.js?v=20260714"></script>
<script src="../../assets/js/db.js?v=20260714"></script>
<script src="../../assets/js/ui.js?v=20260714"></script>
<script src="../../assets/js/icons.js?v=20260714"></script>
<script>
(function () {
  'use strict';

  // --- Cash-out source: WPM (procurement) work packages, via a SERVER-SIDE MIRROR ---
  // Procurement budgets live in a separate Supabase project (WPM) whose anon key is
  // public, so we never read it from the browser. The `sync-wpm` Edge Function copies
  // the needed columns into this app's `wpm_work_packages` mirror (using the WPM
  // service key, server-side only). This module reads that mirror under normal RLS,
  // and admins/planners can trigger a fresh sync from the toolbar.

  var pid = null, profile = null, projName = '';
  var settings = null;           // cash_flow_settings row (or defaults)
  var scheduleRows = [];         // project_schedule leaves
  var milestones = [];           // {name, date} for DP-tranche milestone timing
  var tranches = [];             // cash_flow_dp_tranches rows (client DP breakdown)
  var editTranches = [];         // working copy while the Assumptions modal is open
  var periodMode = 'month';      // periodic chart aggregation: 'month' | 'quarter'
  var pvState = null;            // geometry + data for the periodic-chart tooltip
  var selRange = null;           // {i0,i1} highlighted month-index range (matrix ↔ chart)
  var wpRows = [];               // mirrored WPM work packages (cash-out)
  var wpmStatus = 'idle';        // idle | loading | ok | empty | error | no-map
  var wpmMsg = '', wpmSyncedAt = null;
  var model = null;              // computed projection
  function canSync() { return profile && ['super_admin','admin','planner'].indexOf(profile.role) !== -1; }

  function sb() { return AppAuth.getSB(); }
  function esc(s) { return Fmt.esc(s); }
  function num(v) { return Number(v) || 0; }
  var MABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function pd(v) { if (!v) return null; var m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})/); if (m) return new Date(+m[1], +m[2]-1, +m[3]); var d = new Date(v); return isNaN(d) ? null : d; }
  function monthLabel(d) { return MABBR[d.getMonth()] + " '" + String(d.getFullYear()).slice(2); }
  function monthDiff(a, b) { return (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth()); }
  function today() { return new Date(); }   // data date (wall clock)
  function iso(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

  // ---- Defaults for a project with no saved assumptions ----
  function defaults() {
    return { project_id: pid, contract_ibb: null, contract_bcb: null, dp_percent: 0,
      retention_percent: 0.10, dp_recoup_percent: null, billing_terms_months: 1,
      retention_release_months: 1, start_period: null, wpm_project_id: pid, remarks: null };
  }

  // ==========================================================================
  // LOADERS
  // ==========================================================================
  async function loadProjects() {
    var projects = await PDb.getProjects();
    var sel = document.getElementById('cf-project');
    pid = sessionStorage.getItem('pd_project') || (projects[0] && projects[0].id) || null;
    var cur = projects.find(function (p) { return p.id === pid; });
    projName = cur ? (cur.name || cur.id) : '';
    sel.innerHTML = '<option value="">— Select project —</option>' + projects.map(function (p) {
      return '<option value="' + esc(p.id) + '"' + (p.id === pid ? ' selected' : '') + '>' + esc(p.name || p.id) + '</option>';
    }).join('');
    if (pid) loadAll();
  }

  async function loadSettings() {
    var res = await sb().from('cash_flow_settings').select('*').eq('project_id', pid).maybeSingle();
    if (res.error && res.error.code !== 'PGRST116') { UI.toast(res.error.message, 'error'); }
    settings = res.data || defaults();
    if (settings.dp_recoup_percent == null) settings.dp_recoup_percent = settings.dp_percent;
    if (!settings.wpm_project_id) settings.wpm_project_id = pid;
  }

  async function loadSchedule() {
    // paginated fetch of the project's activities (leaves drive the S-curve)
    scheduleRows = [];
    var from = 0, page = 1000;
    for (;;) {
      var res = await sb().from('project_schedule').select('activity_name,activity_type,start_date,end_date,duration_days,percent_complete,actual_start,actual_finish')
        .eq('project_id', pid).range(from, from + page - 1);
      if (res.error) { UI.toast('Schedule: ' + res.error.message, 'error'); break; }
      var d = res.data || []; scheduleRows = scheduleRows.concat(d);
      if (d.length < page) break; from += page;
    }
    // milestones (named, 0-duration or typed) — for DP-tranche timing
    milestones = scheduleRows.filter(function (r) {
      var t = (r.activity_type || '').toLowerCase();
      return (t.indexOf('milestone') !== -1 || num(r.duration_days) === 0) && r.activity_name && r.start_date;
    }).map(function (r) { return { name: r.activity_name, date: r.start_date }; });
    // keep only leaf activities (not WBS summaries) that have a start date
    scheduleRows = scheduleRows.filter(function (r) {
      var t = (r.activity_type || '').toLowerCase();
      return t.indexOf('wbs') === -1 && t.indexOf('summary') === -1 && r.start_date;
    });
  }

  async function loadTranches() {
    var res = await sb().from('cash_flow_dp_tranches').select('*').eq('project_id', pid).order('seq');
    tranches = (res.error ? [] : (res.data || []));
  }
  function milestoneDate(name) { var m = milestones.find(function (x) { return x.name === name; }); return m ? pd(m.date) : null; }

  async function loadWPM() {
    wpRows = []; wpmStatus = 'loading'; wpmMsg = ''; wpmSyncedAt = null;
    var wpmPid = settings.wpm_project_id;
    if (!wpmPid) { wpmStatus = 'no-map'; wpmMsg = 'No WPM project id mapped'; return; }
    var res = await sb().from('wpm_work_packages').select('*').eq('wpm_project_id', wpmPid);
    if (res.error) { wpmStatus = 'error'; wpmMsg = res.error.message; return; }
    wpRows = res.data || [];
    wpmStatus = wpRows.length ? 'ok' : 'empty';
    if (wpRows.length) wpmSyncedAt = wpRows.reduce(function (a, r) { return r.synced_at && r.synced_at > a ? r.synced_at : a; }, '');
    if (!wpRows.length) wpmMsg = 'Mirror empty for "' + wpmPid + '" — click "Sync from WPM"';
  }

  // Trigger the server-side Edge Function to refresh the mirror from WPM.
  async function syncWPM() {
    if (!canSync()) { UI.toast('Only admins/planners can sync from WPM.', 'error'); return; }
    var wpmPid = settings && settings.wpm_project_id;
    var btn = document.getElementById('cf-sync');
    if (btn) { btn.disabled = true; btn.innerHTML = 'Syncing…'; }
    try {
      var res = await sb().functions.invoke('sync-wpm', { body: { wpm_project_id: wpmPid } });
      if (res.error) throw res.error;
      var d = res.data || {};
      UI.toast('Synced ' + (d.written != null ? d.written : '') + ' work packages from WPM.', 'success');
      await loadWPM(); model = computeProjection(); render();
    } catch (e) {
      var msg = (e && (e.message || (e.context && e.context.error))) || 'Sync failed';
      UI.toast('WPM sync failed: ' + msg, 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.innerHTML = '<span data-ico="refresh" data-ico-size="15"></span> Sync from WPM'; if (window.Icons) Icons.hydrate(btn); }
    }
  }

  async function loadAll() {
    if (!pid) { render(); return; }
    document.getElementById('cf-body').innerHTML = '<div class="cf-empty">Loading projection…</div>';
    await loadSettings();
    await Promise.all([loadSchedule(), loadWPM(), loadTranches()]);
    model = computeProjection();
    render();
  }

  // ==========================================================================
  // SCHEDULE S-CURVE (duration-weighted planned % per month) — cash-in timing
  // ==========================================================================
  function scheduleCurve(months) {
    function val(a) { if (a.duration_days) return num(a.duration_days); var s = pd(a.start_date), e = pd(a.end_date); if (s && e) return (e - s) / 86400000 + 1; return 1; }
    var TOT = scheduleRows.reduce(function (s, a) { return s + val(a); }, 0) || 1;
    // cumulative planned fraction at each month end
    return months.map(function (m) {
      var mEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0);
      var pvDone = 0;
      scheduleRows.forEach(function (a) {
        var s = pd(a.start_date), e = pd(a.end_date) || s; if (!s) return;
        var pf = mEnd >= e ? 1 : (mEnd < s ? 0 : (e > s ? (mEnd - s) / (e - s) : 1));
        pvDone += val(a) * pf;
      });
      return pvDone / TOT;   // 0..1 cumulative
    });
  }

  // Blended cumulative fraction: ACTUAL progress (duration-weighted % complete,
  // using actual dates) up to the data date, then PLANNED-shaped continuation from
  // the actual %-to-date up to 100%. So cash-in billing to date reflects real
  // physical progress, and the forecast resumes on the plan's remaining shape.
  function scheduleCurveBlended(months, ddIdx) {
    function val(a) { if (a.duration_days) return num(a.duration_days); var s = pd(a.start_date), e = pd(a.end_date); if (s && e) return (e - s) / 86400000 + 1; return 1; }
    var TOT = scheduleRows.reduce(function (s, a) { return s + val(a); }, 0) || 1;
    var planned = scheduleCurve(months);
    var overallDone = scheduleRows.reduce(function (s, a) { return s + val(a) * Math.max(0, Math.min(100, num(a.percent_complete))) / 100; }, 0);
    var actualFracDD = overallDone / TOT;                 // true % complete at the data date
    var plannedDD = planned[clampIdx(ddIdx, months.length)];
    return months.map(function (m, i) {
      if (i < ddIdx) {
        // actual accrual to this month end, weighted by each activity's % complete
        var mEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0), av = 0;
        scheduleRows.forEach(function (a) {
          var aS = pd(a.actual_start || a.start_date), aE = pd(a.actual_finish) || pd(a.end_date) || aS; if (!aS) return;
          var f = mEnd >= aE ? 1 : (mEnd < aS ? 0 : (aE > aS ? (mEnd - aS) / (aE - aS) : 1));
          av += val(a) * (Math.max(0, Math.min(100, num(a.percent_complete))) / 100) * f;
        });
        return Math.min(actualFracDD, av / TOT);
      }
      if (i === ddIdx) return actualFracDD;               // anchor to true % complete
      var totRem = 1 - plannedDD;                          // planned-shaped continuation
      return actualFracDD + (totRem > 0 ? (planned[i] - plannedDD) / totRem : 0) * (1 - actualFracDD);
    });
  }

  // Resolve the DP tranches → {amount, dueIdx, recoupRate, pool, label, category}.
  // Falls back to the single settings.dp_percent (received up front) when no
  // tranches are defined, so pre-tranche projects keep working.
  function resolveTranches(base, months, n) {
    var start = months[0];
    var list = tranches.length ? tranches
      : (num(settings.dp_percent) > 0 ? [{ basis: 'percent', percent: settings.dp_percent, timing_mode: 'offset', timing_offset: 0 }] : []);
    return list.map(function (t) {
      var amount = t.basis === 'amount' ? num(t.amount) : base * num(t.percent);
      var dueIdx = 0;
      if (t.timing_mode === 'month' && t.timing_month) dueIdx = monthDiff(start, pd(t.timing_month));
      else if (t.timing_mode === 'milestone' && t.milestone) { var md = milestoneDate(t.milestone); dueIdx = md ? monthDiff(start, md) : 0; }
      else dueIdx = num(t.timing_offset);   // 'offset' (default)
      // Proportional recoup rate: explicit, else the tranche's own % of contract
      // (so a tranche worth X% of the contract is fully recouped over 100% billing).
      var recoupRate = t.recoup_percent != null ? num(t.recoup_percent) : (base > 0 ? amount / base : 0);
      return { amount: amount, dueIdx: dueIdx, recoupRate: recoupRate, pool: amount, label: t.label, category: t.category };
    });
  }

  // Build the month timeline covering schedule + all WP windows (+ retention tail)
  function buildTimeline() {
    var dates = [];
    scheduleRows.forEach(function (a) { var s = pd(a.start_date), e = pd(a.end_date); if (s) dates.push(s); if (e) dates.push(e); });
    wpRows.forEach(function (w) {
      [w.awarding_date, w.actual_awarding_date, w.target_delivery, w.target_installation, w.target_completion].forEach(function (d) { var x = pd(d); if (x) dates.push(x); });
    });
    var start = settings.start_period ? pd(settings.start_period) : (dates.length ? new Date(Math.min.apply(null, dates.map(Number))) : null);
    var end = dates.length ? new Date(Math.max.apply(null, dates.map(Number))) : null;
    if (!start || !end) return [];
    // extend for terms lags + retention release (cash-in AND the longest WP cash-out terms,
    // so a package completing near schedule-end still has room for its retention release)
    var maxWpTerms = wpRows.reduce(function (a, w) { return Math.max(a, Math.round(num(w.payment_terms_days) / 30)); }, 0);
    var tail = Math.max(num(settings.billing_terms_months), 0) +
      Math.max(num(settings.retention_release_months), 0) + maxWpTerms + 2;
    var months = [], c = new Date(start.getFullYear(), start.getMonth(), 1);
    var last = new Date(end.getFullYear(), end.getMonth() + tail, 1);
    while (c <= last) { months.push(new Date(c)); c = new Date(c.getFullYear(), c.getMonth() + 1, 1); }
    return months;
  }

  // ==========================================================================
  // PROJECTION ENGINE (matches the Excel Cashflow sheet structure)
  // ==========================================================================
  function computeProjection() {
    var months = buildTimeline();
    var n = months.length;
    if (!n) return { empty: true };

    var z = function () { return new Array(n).fill(0); };
    // ---- CASH IN (revenue) — driven by the schedule S-curve ----
    var inDP = z(), inBill = z(), inRet = z();     // periodic components (received basis)
    var base = num(settings.contract_ibb);         // billable contract (VAT inc)
    var retPct = num(settings.retention_percent);
    var termsIn = Math.round(num(settings.billing_terms_months));
    var relIn = Math.round(num(settings.retention_release_months));

    // Resolve the DP tranches into {dueIdx, amount, recoupRate, pool}. If none are
    // defined, fall back to the single settings.dp_percent (received up front) so
    // existing projects keep working.
    var dpTranches = resolveTranches(base, months, n);
    var dpTotal = dpTranches.reduce(function (a, t) { return a + t.amount; }, 0);

    var ddIdxIn = clampIdx(monthDiff(months[0], new Date(today().getFullYear(), today().getMonth(), 1)), n);
    if (base > 0) {
      var cum = scheduleCurveBlended(months, ddIdxIn);   // actual to data date, planned after
      // Each tranche's cash lands at its own resolved due month (its own schedule).
      dpTranches.forEach(function (t) { if (t.amount > 0) inDP[clampIdx(t.dueIdx, n)] += t.amount; });
      var retTotal = 0, lastBillMonth = 0, prev = 0;
      for (var i = 0; i < n; i++) {
        var progress = Math.max(0, cum[i] - prev); prev = cum[i];
        var gross = base * progress;              // this month's progress billing (certified)
        if (gross <= 0) continue;
        var ret = gross * retPct; retTotal += ret;
        // Proportional recoup: each tranche claws back its rate × this billing until spent.
        var recoup = 0;
        dpTranches.forEach(function (t) {
          if (t.pool <= 0) return;
          var r = Math.min(t.pool, gross * t.recoupRate); t.pool -= r; recoup += r;
        });
        var net = gross - ret - recoup;           // net certified this month
        inBill[Math.min(n - 1, i + termsIn)] += net;   // cash received after terms lag
        lastBillMonth = i;
      }
      // retention released after completion + release lag
      if (retTotal > 0) { var ri = Math.min(n - 1, lastBillMonth + relIn); inRet[ri] += retTotal; }
    }

    // ---- CASH OUT (payments) — from WPM work packages, each spread over its window ----
    // Basis (per project decision): total_awarded (awarded_cost + additionals) where
    // awarded, else approved_budget_bcb for not-yet-awarded packages.
    // Fallback window for packages with NO usable dates: the schedule span (so their
    // budget is still projected rather than silently dropped). Counted for the chip.
    var outDP = z(), outBill = z(), outRet = z();
    // Actual vs forecast (grounded in WPM award status): an AWARDED package's
    // payments landing on/before the data date are actual committed cash-out;
    // the awarded remainder + all un-awarded packages are forecast.
    var outActual = z(), outForecast = z();
    var ddIdx = clampIdx(monthDiff(months[0], new Date(today().getFullYear(), today().getMonth(), 1)), n);
    function isAwarded(w) {
      if (/award/i.test(w.award_status || '')) return true;      // "Awarded" / "Partially Awarded"
      return num(w.awarded_cost) > 0 || num(w.total_awarded) > 0 || !!w.actual_awarding_date;
    }
    function outAdd(arr, idx, amt, awarded) { arr[idx] += amt; if (awarded && idx <= ddIdx) outActual[idx] += amt; else outForecast[idx] += amt; }
    var schedDates = scheduleRows.map(function (a) { return pd(a.start_date); }).filter(Boolean).map(Number);
    var schedEndDates = scheduleRows.map(function (a) { return pd(a.end_date) || pd(a.start_date); }).filter(Boolean).map(Number);
    var fbStart = schedDates.length ? new Date(Math.min.apply(null, schedDates)) : months[0];
    var fbEnd = schedEndDates.length ? new Date(Math.max.apply(null, schedEndDates)) : months[n - 1];
    var wpNoDates = 0, wpNoDatesAmt = 0;
    wpRows.forEach(function (w) {
      var budget = num(w.total_awarded) || num(w.awarded_cost) || num(w.approved_budget_bcb);
      if (budget <= 0) return;
      var wdp = num(w.dp_percent), wret = num(w.retention_percent);
      var wterms = Math.round(num(w.payment_terms_days) / 30);   // days → months
      // window: award/delivery start → completion
      var ws = pd(w.actual_awarding_date) || pd(w.awarding_date) || pd(w.target_delivery) || pd(w.target_installation);
      var we = pd(w.target_completion) || pd(w.target_installation) || pd(w.target_delivery) || ws;
      if (!ws) { ws = fbStart; we = fbEnd; wpNoDates++; wpNoDatesAmt += budget; }
      if (!we || we < ws) we = ws;
      var sIdx = clampIdx(monthDiff(months[0], ws), n), eIdx = clampIdx(monthDiff(months[0], we), n);
      var span = Math.max(1, eIdx - sIdx + 1);
      // DP paid at window start (+terms)
      var awd = isAwarded(w);
      var dpAmtO = budget * wdp;
      if (dpAmtO > 0) outAdd(outDP, clampIdx(sIdx + wterms, n), dpAmtO, awd);
      var dpPoolO = dpAmtO, retTotalO = 0;
      var billable = budget;                       // gross progress payments total = budget
      for (var k = 0; k < span; k++) {
        var mIdx = sIdx + k;
        var grossO = billable / span;              // linear spread over the window
        var retO = grossO * wret; retTotalO += retO;
        var recoupO = Math.min(dpPoolO, grossO * wdp); dpPoolO -= recoupO;
        var netO = grossO - retO - recoupO;
        outAdd(outBill, clampIdx(mIdx + wterms, n), netO, awd);
      }
      if (retTotalO > 0) outAdd(outRet, clampIdx(eIdx + wterms + 1, n), retTotalO, awd);
    });

    // ---- roll-ups ----
    var inPer = z(), outPer = z(), netPer = z(), inCum = z(), outCum = z(), netCum = z();
    // actual/forecast split — cash-out from award status; cash-in by data date
    // (cash-in actuals aren't recorded yet, so its "actual" = plan through data date)
    var inActualPer = z(), inForecastPer = z(), outActualPer = z(), outForecastPer = z();
    var ic = 0, oc = 0, nc = 0, outActualTot = 0;
    for (var m = 0; m < n; m++) {
      inPer[m] = inDP[m] + inBill[m] + inRet[m];
      outPer[m] = -(outDP[m] + outBill[m] + outRet[m]);   // negative
      netPer[m] = inPer[m] + outPer[m];
      inActualPer[m] = m <= ddIdx ? inPer[m] : 0;
      inForecastPer[m] = m <= ddIdx ? 0 : inPer[m];
      outActualPer[m] = -outActual[m];              // negative
      outForecastPer[m] = -outForecast[m];          // negative
      outActualTot += outActual[m];
      ic += inPer[m]; oc += outPer[m]; nc += netPer[m];
      inCum[m] = ic; outCum[m] = oc; netCum[m] = nc;
    }
    var peak = Math.min.apply(null, netCum);     // most negative cumulative = peak funding need
    return { empty: false, months: months, n: n, ddIdx: ddIdx,
      inDP: inDP, inBill: inBill, inRet: inRet, inPer: inPer, inCum: inCum,
      outDP: outDP, outBill: outBill, outRet: outRet, outPer: outPer, outCum: outCum,
      inActualPer: inActualPer, inForecastPer: inForecastPer,
      outActualPer: outActualPer, outForecastPer: outForecastPer,
      netPer: netPer, netCum: netCum,
      totalIn: ic, totalOut: oc, closing: nc, peak: peak, outActualTot: -outActualTot,
      wpCount: wpRows.length, wpNoDates: wpNoDates, wpNoDatesAmt: wpNoDatesAmt,
      dpTotal: dpTotal, dpCount: dpTranches.length };
  }
  function clampIdx(i, n) { return Math.max(0, Math.min(n - 1, i)); }

  // ==========================================================================
  // RENDER
  // ==========================================================================
  function srcChips() {
    var host = document.getElementById('cf-src');
    var hasContract = settings && num(settings.contract_ibb) > 0;
    var schedCls = scheduleRows.length ? 'ok' : 'warn';
    var contractCls = hasContract ? 'ok' : 'warn';
    var wpmCls = wpmStatus === 'ok' ? 'ok' : (wpmStatus === 'loading' ? '' : (wpmStatus === 'empty' || wpmStatus === 'no-map' ? 'warn' : 'bad'));
    var syncedTxt = wpmSyncedAt ? ' · synced ' + Fmt.date(wpmSyncedAt) : '';
    var wpmTxt = wpmStatus === 'ok' ? ('WPM cash-out · ' + wpRows.length + ' work packages' + syncedTxt)
      : wpmStatus === 'loading' ? 'WPM cash-out · loading…'
      : 'WPM cash-out · ' + (wpmMsg || wpmStatus);
    host.innerHTML =
      chip(contractCls, hasContract ? 'Contract set · IBB ' + Fmt.moneyShort(settings.contract_ibb) : 'Contract not set — open Assumptions') +
      chip(schedCls, scheduleRows.length ? 'Schedule S-curve · ' + scheduleRows.length + ' activities' : 'No schedule — cash-in needs the Project Schedule') +
      chip(wpmCls, wpmTxt) +
      (model && model.wpNoDates ? chip('warn', model.wpNoDates + ' WP(s) had no dates · ' + Fmt.moneyShort(model.wpNoDatesAmt) + ' spread over the schedule span') : '');
  }
  function chip(cls, txt) { return '<span class="cf-chip ' + cls + '"><span class="dot"></span>' + esc(txt) + '</span>'; }

  function render() {
    srcChips();
    var host = document.getElementById('cf-body');
    if (!pid) { host.innerHTML = '<div class="cf-empty">Select a project.</div>'; return; }
    if (!model || model.empty) {
      host.innerHTML = '<div class="cf-empty">Nothing to project yet. This module derives cash-in from the <b>Project Schedule</b> and cash-out from <b>WPM</b> work packages. Add a schedule and set the contract value under <b>Assumptions</b>.</div>';
      return;
    }
    host.innerHTML = kpiHTML() + chartHTML() + matrixHTML();
    drawPeriodic();
    var mb = document.getElementById('cf-pm-month'), qb = document.getElementById('cf-pm-quarter');
    if (mb) mb.onclick = function () { setPeriodMode('month'); };
    if (qb) qb.onclick = function () { setPeriodMode('quarter'); };
    host.querySelectorAll('.cf-matrix th.mcol').forEach(function (th) {
      th.onclick = function () { selectMonth(+th.dataset.mi); };
    });
  }

  // Two-way selection: a month header in the table and a bar in the chart both map
  // to the same month-index range and highlight each other (toggle).
  function selectMonth(mi) {   // from a table month header → its period's range
    var per = buildPeriods().filter(function (p) { return mi >= p.i0 && mi <= p.i1; })[0];
    setSel(per ? { i0: per.i0, i1: per.i1 } : { i0: mi, i1: mi }, false);
  }
  function setSel(range, scrollTable) {
    var same = selRange && range && selRange.i0 === range.i0 && selRange.i1 === range.i1;
    selRange = same ? null : range;
    document.querySelectorAll('.cf-matrix th.mcol').forEach(function (th) {
      var i = +th.dataset.mi; th.classList.toggle('sel', !!selRange && i >= selRange.i0 && i <= selRange.i1);
    });
    drawPeriodic();
    if (selRange) {
      var target = scrollTable ? document.querySelector('.cf-matrix th.mcol.sel') : document.getElementById('cf-chart-periodic');
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    }
  }

  function kpiHTML() {
    function k(l, v, sub, cls) { return '<div class="cf-kpi"><div class="cf-kpi-l">' + l + '</div><div class="cf-kpi-v ' + (cls || '') + '">' + v + '</div>' + (sub ? '<div class="cf-kpi-s">' + sub + '</div>' : '') + '</div>'; }
    return '<div class="cf-kpis">' +
      k('Contract (IBB)', Fmt.moneyShort(settings.contract_ibb), 'VAT inclusive · cash-in base') +
      k('Total Cash In', Fmt.moneyShort(model.totalIn), (model.dpCount ? 'DP ' + Fmt.moneyShort(model.dpTotal) + ' in ' + model.dpCount + ' tranche' + (model.dpCount > 1 ? 's' : '') + ' · ' : '') + 'over ' + model.n + ' months') +
      k('Total Cash Out', Fmt.moneyShort(model.totalOut), 'actual to date ' + Fmt.moneyShort(model.outActualTot) + ' · ' + model.wpCount + ' WPs (awarded status)') +
      k('Closing Balance', Fmt.moneyShort(model.closing), 'end of projection', model.closing >= 0 ? 'cf-ok' : 'cf-bad') +
      k('Peak Funding Need', Fmt.moneyShort(model.peak), 'most negative cumulative', model.peak < 0 ? 'cf-bad' : 'cf-ok') +
    '</div>';
  }

  function chartHTML() {
    var seg = '<div class="cf-seg"><button id="cf-pm-month" class="' + (periodMode === 'month' ? 'active' : '') + '">Monthly</button>' +
      '<button id="cf-pm-quarter" class="' + (periodMode === 'quarter' ? 'active' : '') + '">Quarterly</button></div>';
    return '<div class="cf-card">' +
      '<div class="cf-chart-head"><div><h3>Periodic Cash Flow</h3>' +
      '<p class="sub" style="margin-bottom:0;">Cash received (up) vs paid (down) per period; net line. Solid = actual through the data date (' + Fmt.date(iso(today())) + ') — cash-in from schedule <b>% complete</b>, cash-out from <b>awarded</b> WPs; faded/dashed = forecast. Click a month in the table below to highlight its bar.</p></div>' + seg + '</div>' +
      '<div class="cf-chart-wrap" id="cf-chart-periodic"></div></div>';
  }

  // Aggregate the monthly series into the selected period, keeping the actual /
  // forecast split for both cash-in and cash-out.
  function buildPeriods() {
    var m = model;
    function mk(label, date) { return { label: label, date: date, inv: 0, out: 0, net: 0, invA: 0, invF: 0, outA: 0, outF: 0, i0: Infinity, i1: -Infinity }; }
    function add(b, i) { b.inv += m.inPer[i]; b.out += m.outPer[i]; b.net += m.netPer[i]; b.invA += m.inActualPer[i]; b.invF += m.inForecastPer[i]; b.outA += m.outActualPer[i]; b.outF += m.outForecastPer[i]; b.i0 = Math.min(b.i0, i); b.i1 = Math.max(b.i1, i); }
    if (periodMode === 'quarter') {
      var order = [], by = {};
      m.months.forEach(function (mo, i) {
        var q = Math.floor(mo.getMonth() / 3), key = mo.getFullYear() + '-' + q;
        var b = by[key]; if (!b) { b = by[key] = mk('Q' + (q + 1) + " '" + String(mo.getFullYear()).slice(2), new Date(mo.getFullYear(), q * 3, 1)); order.push(key); }
        add(b, i);
      });
      return order.map(function (k) { return by[k]; });
    }
    return m.months.map(function (mo, i) { var b = mk(monthLabel(mo), new Date(mo)); add(b, i); return b; });
  }

  // Periodic combo chart: green bars up = cash in, red bars down = cash out, ink
  // line = net. Band-aligned bars + axes; actual/forecast split at the data date;
  // data labels (quarterly) + hover tooltip.
  function drawPeriodic() {
    var host = document.getElementById('cf-chart-periodic'); if (!host) return;
    var P = buildPeriods(), nP = P.length;
    var W = 1000, H = 320, padL = 64, padR = 18, padT = 18, padB = 40;
    var cw = W - padL - padR, ch = H - padT - padB;
    var maxAbs = Math.max(
      Math.max.apply(null, P.map(function (p) { return p.inv; })),
      Math.abs(Math.min.apply(null, P.map(function (p) { return p.out; }))),
      Math.max.apply(null, P.map(function (p) { return Math.abs(p.net); }))
    ) * 1.12 || 1;
    var band = cw / nP;
    function cx(i) { return padL + band * (i + 0.5); }
    function y(v) { return padT + ch * (1 - (v + maxAbs) / (2 * maxAbs)); }
    var zeroY = y(0);
    // actual/forecast boundary: last period whose start month is ≤ the data date
    var dd = today(), ddM = new Date(dd.getFullYear(), dd.getMonth(), 1);
    var split = 0; P.forEach(function (p, i) { if (p.date <= ddM) split = i + 1; });

    // grid + Y labels + axes
    var grid = '';
    [-1, -0.5, 0, 0.5, 1].forEach(function (f) { var v = maxAbs * f, yy = y(v); grid += '<line x1="' + padL + '" y1="' + yy + '" x2="' + (W - padR) + '" y2="' + yy + '" class="' + (f === 0 ? 'cf-zero' : 'cf-grid') + '"/><text x="' + (padL - 8) + '" y="' + (yy + 3.5) + '" class="cf-ylab">' + Fmt.moneyShort(v) + '</text>'; });
    grid += '<line x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + (padT + ch) + '" class="cf-axis"/>';
    // selection highlight — any period overlapping the selected month range
    if (selRange) P.forEach(function (p, j) {
      if (p.i1 >= selRange.i0 && p.i0 <= selRange.i1) grid += '<rect x="' + (padL + band * j) + '" y="' + padT + '" width="' + band + '" height="' + ch + '" class="cf-selband"/>';
    });

    var bw = Math.max(2, Math.min(28, band * 0.62)), showLab = periodMode === 'quarter' || band >= 44;
    var bars = '', labs = '', hovers = '';
    function rect(x, yy, w, h, fill, op) { return h > 0.3 ? '<rect x="' + x + '" y="' + yy + '" width="' + w + '" height="' + h + '" fill="' + fill + '" ' + op + '/>' : ''; }
    P.forEach(function (p, i) {
      var x0 = cx(i) - bw / 2;
      // cash IN (up): actual solid, forecast faded, stacked
      if (p.invA > 0) { var ya = y(p.invA); bars += rect(x0, ya, bw, zeroY - ya, 'var(--pd-ok)', ''); }
      if (p.invF > 0) { var yt = y(p.invA + p.invF); bars += rect(x0, yt, bw, y(p.invA) - yt, 'var(--pd-ok)', 'opacity="0.4"'); }
      // cash OUT (down): actual solid, forecast faded, stacked (values negative)
      if (p.outA < 0) { bars += rect(x0, zeroY, bw, y(p.outA) - zeroY, 'var(--pd-red)', ''); }
      if (p.outF < 0) { bars += rect(x0, y(p.outA), bw, y(p.outA + p.outF) - y(p.outA), 'var(--pd-red)', 'opacity="0.4"'); }
      if (showLab && p.inv > 0) labs += '<text x="' + cx(i) + '" y="' + (y(p.inv) - 3) + '" class="cf-dlab">' + Fmt.moneyShort(p.inv) + '</text>';
      if (showLab && p.out < 0) labs += '<text x="' + cx(i) + '" y="' + (y(p.out) + 10) + '" class="cf-dlab">' + Fmt.moneyShort(-p.out) + '</text>';
      hovers += '<rect class="cf-hover" data-i="' + i + '" x="' + (padL + band * i) + '" y="' + padT + '" width="' + band + '" height="' + ch + '"/>';
    });
    // net line — solid (actual) then dashed (forecast), sharing the boundary point
    function seg(a, b, dash) { var pts = []; for (var i = a; i < b; i++) pts.push(cx(i) + ',' + y(P[i].net)); return pts.length > 1 ? '<polyline points="' + pts.join(' ') + '" fill="none" stroke="var(--pd-ink)" stroke-width="2.25" ' + (dash ? 'stroke-dasharray="5 4"' : '') + '/>' : ''; }
    var netLine = seg(0, split, false) + seg(Math.max(0, split - 1), nP, true);
    // X labels (centred under bands)
    var xlab = '', step = Math.max(1, Math.ceil(nP / 14));
    P.forEach(function (p, i) { if (i % step === 0) xlab += '<text x="' + cx(i) + '" y="' + (H - padB + 18) + '" class="cf-xlab">' + esc(p.label) + '</text>'; });

    host.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" class="cf-svg">' + grid + bars + labs + netLine + xlab + hovers + '</svg>' +
      '<div class="cf-tip" id="cf-tip"></div>' +
      '<div class="cf-legend">' +
      '<span class="cf-lg"><span class="sw" style="background:var(--pd-ok);"></span>Cash In</span>' +
      '<span class="cf-lg"><span class="sw" style="background:var(--pd-red);"></span>Cash Out</span>' +
      '<span class="cf-lg"><span class="sw-line" style="border-color:var(--pd-ink);"></span>Net</span>' +
      '<span class="cf-lg"><span class="sw fc" style="background:var(--pd-muted);"></span>Forecast (faded / dashed)</span>' +
      '</div>';

    // running balance for the tooltip
    var run = 0, bal = P.map(function (p) { run += p.net; return run; });
    pvState = { P: P, bal: bal, split: split, W: W, host: host };
    wirePeriodicTip();
  }

  function wirePeriodicTip() {
    if (!pvState) return;
    var host = pvState.host, tip = document.getElementById('cf-tip'), svg = host.querySelector('svg');
    host.querySelectorAll('.cf-hover').forEach(function (r) {
      r.onmouseenter = r.onmousemove = function (ev) {
        var i = +r.dataset.i, p = pvState.P[i]; if (!p) return;
        var outFc = p.outF < 0 ? ' <span style="opacity:.7;">(incl. ' + Fmt.moneyShort(-p.outF) + ' forecast)</span>' : '';
        tip.innerHTML = '<div class="cf-tip-hd">' + esc(p.label) + (i >= pvState.split ? ' · forecast' : '') + '</div>' +
          '<div><span class="g">Cash In</span> ' + Fmt.money(p.inv) + '</div>' +
          '<div><span class="r">Cash Out</span> ' + Fmt.money(-p.out) + outFc + '</div>' +
          '<div><b>Net</b> ' + Fmt.money(p.net) + '</div>' +
          '<div>Balance ' + Fmt.money(pvState.bal[i]) + '</div>';
        var hb = host.getBoundingClientRect();
        var xpx = ev.clientX - hb.left, ypx = ev.clientY - hb.top;
        tip.style.opacity = '1';
        var tw = tip.offsetWidth;
        tip.style.left = Math.max(4, Math.min(hb.width - tw - 4, xpx + 14)) + 'px';
        tip.style.top = Math.max(4, ypx - 10) + 'px';
      };
      r.onmouseleave = function () { tip.style.opacity = '0'; };
      r.onclick = function () { var p = pvState.P[+r.dataset.i]; if (p) setSel({ i0: p.i0, i1: p.i1 }, true); };
    });
  }
  function setPeriodMode(mode) { periodMode = mode; drawPeriodic(); var mb = document.getElementById('cf-pm-month'), qb = document.getElementById('cf-pm-quarter'); if (mb) mb.className = mode === 'month' ? 'active' : ''; if (qb) qb.className = mode === 'quarter' ? 'active' : ''; }

  function matrixHTML() {
    var m = model;
    var hdr = '<th class="lbl">₱</th>' + m.months.map(function (mo, i) { return '<th class="mcol' + (selRange && i >= selRange.i0 && i <= selRange.i1 ? ' sel' : '') + '" data-mi="' + i + '">' + monthLabel(mo) + '</th>'; }).join('') + '<th>Total</th>';
    function cell(v) { var s = v < 0 ? ' class="cf-neg"' : ''; return '<td' + s + '>' + (v ? Fmt.moneyShort(v) : '–') + '</td>'; }
    function total(arr) { return arr.reduce(function (a, b) { return a + b; }, 0); }
    function row(label, arr, cls, sub) {
      return '<tr class="' + (cls || '') + (sub ? ' cf-sub' : '') + '"><td class="lbl">' + label + '</td>' +
        arr.map(cell).join('') + cell(total(arr)) + '</tr>';
    }
    function secHead(label) { return '<tr class="cf-sec"><th class="lbl">' + label + '</th>' + m.months.map(function () { return '<th></th>'; }).join('') + '<th></th></tr>'; }

    return '<div class="cf-card"><h3>Monthly Projection</h3>' +
      '<p class="sub">Cash In (from schedule S-curve × contract) · Cash Out (from WPM work packages) · Net. Cumulative rows in bold.</p>' +
      '<div class="cf-matrix-wrap"><table class="cf-matrix"><thead><tr>' + hdr + '</tr></thead><tbody>' +
      secHead('CASH IN') +
      row('Downpayment', m.inDP, '', true) +
      row('Billing (net of retention &amp; recoup)', m.inBill, '', true) +
      row('Retention release', m.inRet, '', true) +
      row('Cash In — cumulative', m.inCum, 'cf-cum') +
      secHead('CASH OUT') +
      row('Downpayment', m.outDP.map(function (v) { return -v; }), '', true) +
      row('Billing', m.outBill.map(function (v) { return -v; }), '', true) +
      row('Retention', m.outRet.map(function (v) { return -v; }), '', true) +
      row('Cash Out — cumulative', m.outCum, 'cf-cum') +
      '<tr class="cf-net"><td class="lbl">NET CASH FLOW — periodic</td>' + m.netPer.map(cell).join('') + cell(total(m.netPer)) + '</tr>' +
      '<tr class="cf-net"><td class="lbl">NET CASH FLOW — cumulative</td>' + m.netCum.map(function (v) { return '<td>' + (v ? Fmt.moneyShort(v) : '–') + '</td>'; }).join('') + '<td></td></tr>' +
      '</tbody></table></div></div>';
  }

  // ==========================================================================
  // ASSUMPTIONS MODAL
  // ==========================================================================
  function pctVal(v) { return v == null ? '' : (num(v) * 100); }
  function openSettings() {
    if (!pid) { UI.toast('Select a project first.', 'error'); return; }
    var s = settings || defaults();
    var form = document.getElementById('cf-form');
    function fld(label, ctrl, hint, full) { return '<div class="' + (full ? 'cf-form-full' : '') + '"><label class="pd-label">' + label + '</label>' + ctrl + (hint ? '<div class="cf-hint">' + hint + '</div>' : '') + '</div>'; }
    form.innerHTML =
      fld('Contract Amount — IBB (₱, VAT inc.)', '<input class="pd-input" id="s-ibb" type="number" step="0.01" value="' + (s.contract_ibb != null ? s.contract_ibb : '') + '">', 'Cash-in base — total billable to the client.') +
      fld('Contract Amount — BCB (₱)', '<input class="pd-input" id="s-bcb" type="number" step="0.01" value="' + (s.contract_bcb != null ? s.contract_bcb : '') + '">', 'Cost base (reference).') +
      fld('Downpayment % (simple)', '<input class="pd-input" id="s-dp" type="number" step="0.01" value="' + pctVal(s.dp_percent) + '">', 'Used only when NO tranches are defined below.') +
      fld('Retention %', '<input class="pd-input" id="s-ret" type="number" step="0.01" value="' + pctVal(s.retention_percent) + '">', 'Withheld from each billing, e.g. 10.') +
      fld('Billing terms (months)', '<input class="pd-input" id="s-terms" type="number" step="1" value="' + (s.billing_terms_months != null ? s.billing_terms_months : 1) + '">', 'Lag from certification to cash receipt.') +
      fld('Retention release (months after completion)', '<input class="pd-input" id="s-rel" type="number" step="1" value="' + (s.retention_release_months != null ? s.retention_release_months : 1) + '">') +
      fld('Cashflow start month', '<input class="pd-input" id="s-start" type="month" value="' + (s.start_period ? String(s.start_period).slice(0, 7) : '') + '">', 'Blank → schedule start.') +
      fld('WPM project id (cash-out source)', '<input class="pd-input" id="s-wpm" value="' + esc(s.wpm_project_id || '') + '">', 'The Procurement app project id whose work packages fund cash-out. Blank → this project id.', true) +
      fld('Remarks', '<textarea class="pd-input" id="s-rem" rows="2">' + esc(s.remarks) + '</textarea>', '', true) +
      // ---- Downpayment tranches ----
      '<div class="cf-form-full"><div class="cf-dp-head"><label class="pd-label" style="margin:0;">Downpayment Tranches</label>' +
        '<button type="button" class="cf-btn-sm" id="cf-dp-add">+ Add tranche</button></div>' +
        '<div class="cf-hint">Break the DP into tranches — each tagged by trade/agreement, timed by a schedule milestone, a fixed month, or an offset from start, and recouped proportionally. When any tranche exists it overrides the simple % above. <b id="cf-dp-sum"></b></div>' +
        '<div id="cf-dp-list"></div></div>';
    editTranches = (tranches || []).map(function (t) { return JSON.parse(JSON.stringify(t)); });
    renderTranches();
    document.getElementById('cf-dp-add').onclick = function () {
      editTranches.push({ label: 'DP Tranche ' + (editTranches.length + 1), category: '', basis: 'percent', percent: null, amount: null, timing_mode: 'milestone', timing_month: null, timing_offset: 0, milestone: '', recoup_percent: null });
      renderTranches();
    };
    document.getElementById('cf-modal').style.display = 'flex';
  }

  // Render the editable tranche rows from editTranches. Each control writes back to
  // its tranche on change; changing the timing mode re-renders that row's timing input.
  function renderTranches() {
    var host = document.getElementById('cf-dp-list'); if (!host) return;
    var base = numInput('s-ibb') || 0;
    var mlOpts = milestones.map(function (m) { return '<option value="' + esc(m.name) + '">'; }).join('');
    function timingCtrl(t, i) {
      if (t.timing_mode === 'month') return '<input class="pd-input cf-dp-i" data-i="' + i + '" data-k="timing_month" type="month" value="' + (t.timing_month ? String(t.timing_month).slice(0, 7) : '') + '">';
      if (t.timing_mode === 'milestone') return '<input class="pd-input cf-dp-i" data-i="' + i + '" data-k="milestone" list="cf-ml-list" placeholder="milestone name" value="' + esc(t.milestone || '') + '">';
      return '<input class="pd-input cf-dp-i" data-i="' + i + '" data-k="timing_offset" type="number" step="1" placeholder="months from start" value="' + (t.timing_offset != null ? t.timing_offset : 0) + '">';
    }
    host.innerHTML = '<datalist id="cf-ml-list">' + mlOpts + '</datalist>' + (editTranches.length ? editTranches.map(function (t, i) {
      var amt = t.basis === 'amount' ? num(t.amount) : base * num(t.percent);
      return '<div class="cf-dp-row">' +
        '<input class="pd-input cf-dp-i" data-i="' + i + '" data-k="label" placeholder="Label" value="' + esc(t.label || '') + '">' +
        '<input class="pd-input cf-dp-i" data-i="' + i + '" data-k="category" placeholder="Trade / tag" value="' + esc(t.category || '') + '">' +
        '<select class="pd-select cf-dp-i" data-i="' + i + '" data-k="basis"><option value="percent"' + (t.basis !== 'amount' ? ' selected' : '') + '>% of contract</option><option value="amount"' + (t.basis === 'amount' ? ' selected' : '') + '>fixed ₱</option></select>' +
        '<input class="pd-input cf-dp-i" data-i="' + i + '" data-k="' + (t.basis === 'amount' ? 'amount' : 'percent_pct') + '" type="number" step="0.01" placeholder="' + (t.basis === 'amount' ? '₱ amount' : '%') + '" value="' + (t.basis === 'amount' ? (t.amount != null ? t.amount : '') : pctVal(t.percent)) + '">' +
        '<select class="pd-select cf-dp-i" data-i="' + i + '" data-k="timing_mode"><option value="milestone"' + (t.timing_mode === 'milestone' ? ' selected' : '') + '>@ milestone</option><option value="month"' + (t.timing_mode === 'month' ? ' selected' : '') + '>fixed month</option><option value="offset"' + (t.timing_mode === 'offset' ? ' selected' : '') + '>offset (mo)</option></select>' +
        timingCtrl(t, i) +
        '<input class="pd-input cf-dp-i" data-i="' + i + '" data-k="recoup_pct" type="number" step="0.01" placeholder="recoup % (auto)" value="' + pctVal(t.recoup_percent) + '">' +
        '<button type="button" class="cf-btn-sm cf-dp-del" data-i="' + i + '" title="Remove">&#215;</button>' +
        '<div class="cf-dp-amt">' + (amt > 0 ? Fmt.moneyShort(amt) : '—') + '</div>' +
      '</div>';
    }).join('') : '<div class="cf-hint" style="padding:6px 0;">No tranches — the simple Downpayment % above is used.</div>');

    // wire inputs
    host.querySelectorAll('.cf-dp-i').forEach(function (el) {
      el.onchange = function () {
        var i = +el.dataset.i, k = el.dataset.k, v = el.value;
        var t = editTranches[i]; if (!t) return;
        if (k === 'percent_pct') t.percent = v === '' ? null : num(v) / 100;
        else if (k === 'recoup_pct') t.recoup_percent = v === '' ? null : num(v) / 100;
        else if (k === 'amount') t.amount = v === '' ? null : num(v);
        else if (k === 'timing_offset') t.timing_offset = v === '' ? 0 : Math.round(num(v));
        else if (k === 'timing_month') t.timing_month = v ? v + '-01' : null;
        else t[k] = v;
        if (k === 'basis' || k === 'timing_mode') renderTranches(); else updateDpSum();
      };
    });
    host.querySelectorAll('.cf-dp-del').forEach(function (b) {
      b.onclick = function () { editTranches.splice(+b.dataset.i, 1); renderTranches(); };
    });
    updateDpSum();
  }
  function updateDpSum() {
    var el = document.getElementById('cf-dp-sum'); if (!el) return;
    var base = numInput('s-ibb') || 0;
    var tot = editTranches.reduce(function (a, t) { return a + (t.basis === 'amount' ? num(t.amount) : base * num(t.percent)); }, 0);
    var pct = base > 0 ? (tot / base * 100) : 0;
    el.textContent = editTranches.length ? ('Total DP: ' + Fmt.moneyShort(tot) + (base > 0 ? ' (' + (Math.round(pct * 100) / 100) + '% of contract)' : '')) : '';
  }

  function pctInput(id) { var e = document.getElementById(id); var v = e && e.value.trim(); return v === '' || v == null ? null : num(v) / 100; }
  function numInput(id) { var e = document.getElementById(id); var v = e && e.value.trim(); return v === '' || v == null ? null : num(v); }
  function txtInput(id) { var e = document.getElementById(id); return e && e.value.trim() ? e.value.trim() : null; }

  async function saveSettings() {
    var payload = {
      project_id: pid,
      contract_ibb: numInput('s-ibb'), contract_bcb: numInput('s-bcb'),
      dp_percent: pctInput('s-dp') || 0, retention_percent: pctInput('s-ret') || 0,
      billing_terms_months: numInput('s-terms') != null ? Math.round(numInput('s-terms')) : 1,
      retention_release_months: numInput('s-rel') != null ? Math.round(numInput('s-rel')) : 1,
      start_period: txtInput('s-start') ? txtInput('s-start') + '-01' : null,
      wpm_project_id: txtInput('s-wpm') || pid,
      remarks: txtInput('s-rem'),
      updated_at: new Date().toISOString()
    };
    var res = await sb().from('cash_flow_settings').upsert(payload, { onConflict: 'project_id' });
    if (res.error) { UI.toast(res.error.message, 'error'); return; }

    // Persist DP tranches: replace the project's set (delete all → insert current).
    var del = await sb().from('cash_flow_dp_tranches').delete().eq('project_id', pid);
    if (del.error) { UI.toast('Tranches: ' + del.error.message, 'error'); return; }
    var rows = editTranches.map(function (t, i) {
      return { project_id: pid, seq: i, label: t.label || null, category: t.category || null,
        basis: t.basis === 'amount' ? 'amount' : 'percent',
        percent: t.basis === 'amount' ? null : (t.percent != null ? num(t.percent) : null),
        amount: t.basis === 'amount' ? (t.amount != null ? num(t.amount) : null) : null,
        timing_mode: t.timing_mode || 'offset',
        timing_month: t.timing_mode === 'month' ? t.timing_month : null,
        timing_offset: t.timing_mode === 'offset' ? Math.round(num(t.timing_offset)) : 0,
        milestone: t.timing_mode === 'milestone' ? (t.milestone || null) : null,
        recoup_percent: t.recoup_percent != null ? num(t.recoup_percent) : null,
        created_by: profile.id, updated_at: new Date().toISOString() };
    });
    if (rows.length) {
      var ins = await sb().from('cash_flow_dp_tranches').insert(rows);
      if (ins.error) { UI.toast('Tranches: ' + ins.error.message, 'error'); return; }
    }
    UI.toast('Assumptions saved.', 'success');
    document.getElementById('cf-modal').style.display = 'none';
    loadAll();
  }

  // ==========================================================================
  // EXPORT
  // ==========================================================================
  function exportExcel() {
    if (!model || model.empty) { UI.toast('Nothing to export.', 'error'); return; }
    var m = model;
    var head = ['₱'].concat(m.months.map(monthLabel)).concat(['Total']);
    function line(label, arr) { var t = arr.reduce(function (a, b) { return a + b; }, 0); return [label].concat(arr).concat([t]); }
    var aoa = [
      ['Cash Flow Projection', projName],
      ['Contract IBB', settings.contract_ibb, 'DP%', settings.dp_percent, 'Retention%', settings.retention_percent],
      [],
      head,
      ['CASH IN'],
      line('  Downpayment', m.inDP),
      line('  Billing (net)', m.inBill),
      line('  Retention release', m.inRet),
      line('  Cumulative', m.inCum),
      ['CASH OUT'],
      line('  Downpayment', m.outDP.map(function (v) { return -v; })),
      line('  Billing', m.outBill.map(function (v) { return -v; })),
      line('  Retention', m.outRet.map(function (v) { return -v; })),
      line('  Cumulative', m.outCum),
      ['NET CASH FLOW'],
      line('  Periodic', m.netPer),
      ['  Cumulative'].concat(m.netCum).concat([''])
    ];
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Cashflow');
    XLSX.writeFile(wb, 'Cashflow - ' + (projName || pid) + '.xlsx');
  }

  // ==========================================================================
  // WIRE-UP
  // ==========================================================================
  AppAuth.requireLogin(function (user, prof) {
    profile = prof; UI.renderUserBar(prof); UI.initShell();
    document.getElementById('cf-project').onchange = function (e) { pid = e.target.value || null; if (pid) { sessionStorage.setItem('pd_project', pid); var o = e.target.selectedOptions[0]; projName = o ? o.textContent : ''; } loadAll(); };
    document.getElementById('cf-refresh').onclick = function () { loadAll(); };
    if (canSync()) document.getElementById('cf-sync').style.display = '';
    document.getElementById('cf-sync').onclick = syncWPM;
    document.getElementById('cf-export').onclick = exportExcel;
    document.getElementById('cf-settings').onclick = openSettings;
    document.getElementById('cf-modal-x').onclick = document.getElementById('cf-cancel').onclick = function () { document.getElementById('cf-modal').style.display = 'none'; };
    document.getElementById('cf-save').onclick = saveSettings;
    document.getElementById('cf-modal').onclick = function (e) { if (e.target === this) this.style.display = 'none'; };
    loadProjects();
  });
})();
</script>
</body>
</html>

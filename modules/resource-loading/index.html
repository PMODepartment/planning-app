<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/img/icon.png" />
  <script src="../../assets/js/theme.js?v=20260720b"></script>
  <title>Resource &amp; Role Master · Planners Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/dashboard.css?v=20260720b" />
  <style>
    /* Uniform sidebar-less chrome (matches Progress Photos / Drawing Register / Cash Flow / S-Curve) */
    .pd-content { width:100%; }
    .pd-topbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; row-gap:8px; }
    .pd-topbar #user-bar { margin-left:10px; padding-left:10px; border-left:1px solid var(--pd-line); flex:none; }
    .pd-topbar #pd-theme-toggle { width:34px; height:34px; padding:0; margin-left:4px; flex:none; display:inline-flex; align-items:center; justify-content:center; }
    .rl-modback { width:36px; height:36px; padding:0; flex:none; display:inline-flex; align-items:center; justify-content:center; }
    .rl-title { flex:0 1 auto; min-width:0; display:flex; align-items:center; overflow:hidden; }
    .rl-title .rl-title-txt { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rl-title-ico { color:var(--pd-red); vertical-align:-3px; margin-right:4px; }
    .rl-projctx { display:flex; align-items:center; min-width:0; flex:0 1 auto; }
    .rl-project { max-width:230px; min-width:120px; height:34px; font-weight:600; font-size:13px; background:transparent; border-color:transparent; }
    .rl-project:hover, .rl-project:focus { background:var(--pd-card); border-color:var(--pd-line); }
    .rl-topbar-tools { display:flex; align-items:center; gap:6px; margin-left:auto; flex-wrap:wrap; }
    .rl-search-input { height:34px; width:200px; font-size:13px; }
    .rl-topbar-tools .pd-btn.rl-tb-labeled { height:34px; padding:0 12px; gap:6px; background:var(--pd-red); border-color:var(--pd-red); color:#fff; }
    .rl-topbar-tools .pd-btn.rl-tb-labeled:hover { filter:brightness(.94); }
    .rl-tb-sep { width:1px; align-self:stretch; margin:5px 3px; background:var(--pd-line); }
    @media (max-width:820px) { .rl-title-txt { display:none; } .rl-search-input { width:140px; } }
    .rl-tabs { display:flex; border-bottom:2px solid var(--pd-line); margin-bottom:14px; }
    .rl-tab { padding:8px 18px; cursor:pointer; font-weight:600; font-size:13px; color:var(--pd-muted); border:none; border-bottom:2px solid transparent; margin-bottom:-2px; background:none; display:inline-flex; align-items:center; gap:6px; }
    .rl-tab.active { color:var(--pd-red); border-bottom-color:var(--pd-red); }

    /* KPI cards */
    .rl-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
    .rl-kpi { background:var(--pd-card); border:1px solid var(--pd-line); border-radius:8px; padding:13px 16px; }
    .rl-kpi-v { font-size:22px; font-weight:800; line-height:1; } .rl-kpi-v.rl-bad { color:var(--pd-bad); }
    .rl-kpi-l { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--pd-muted); margin-top:6px; }

    /* Filter bar (card, matches risk-register / stakeholder-map) */
    .rl-filters { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; background:var(--pd-card); border:1px solid var(--pd-line); border-radius:var(--pd-radius); padding:8px 12px; }
    .rl-filt-ico { color:var(--pd-muted); flex:none; }
    .rl-filters .pd-select { height:34px; font-size:13px; max-width:200px; }

    .rl-table { width:100%; border-collapse:collapse; font-size:13px; }
    .rl-table th { background:var(--pd-bg); padding:9px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--pd-muted); border-bottom:2px solid var(--pd-line); white-space:nowrap; }
    .rl-table th.num, .rl-table td.num { text-align:right; }
    .rl-table td { padding:8px 12px; border-bottom:1px solid var(--pd-line); }
    .rl-table tr:hover td { background:var(--pd-bg); }
    .rl-badge { font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; background:var(--pd-bg); }
    .rl-empty { text-align:center; padding:40px; color:var(--pd-muted); }
    .rl-actions { display:flex; gap:5px; }
    .rl-btn-sm { padding:3px 9px; font-size:11px; border-radius:5px; border:1px solid var(--pd-line); background:var(--pd-card); color:var(--pd-ink); cursor:pointer; }
    .rl-btn-sm:hover { border-color:var(--pd-red); color:var(--pd-red); }

    /* Loading (utilization matrix) */
    .rl-load-controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
    .rl-seg { display:inline-flex; border:1px solid var(--pd-line); border-radius:8px; overflow:hidden; }
    .rl-seg button { border:0; background:var(--pd-card); color:var(--pd-ink); padding:6px 13px; font:inherit; font-size:12.5px; font-weight:600; cursor:pointer; }
    .rl-seg button + button { border-left:1px solid var(--pd-line); }
    .rl-seg button.active { background:var(--pd-red); color:#fff; }
    .rl-ck { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--pd-ink); cursor:pointer; }
    .rl-matrix { border-collapse:collapse; font-size:12.5px; min-width:100%; }
    .rl-matrix th, .rl-matrix td { padding:7px 10px; border-bottom:1px solid var(--pd-line); text-align:right; white-space:nowrap; }
    .rl-matrix thead th { position:sticky; top:0; z-index:2; background:var(--pd-bg); font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--pd-muted); border-bottom:2px solid var(--pd-line); }
    .rl-matrix th:first-child, .rl-matrix td:first-child { position:sticky; left:0; z-index:1; text-align:left; background:var(--pd-card); font-weight:700; }
    .rl-matrix thead th:first-child { z-index:3; background:var(--pd-bg); }
    .rl-matrix tfoot td { font-weight:800; border-top:2px solid var(--pd-line); background:var(--pd-card); }
    .rl-u-ok   { background:rgba(22,163,74,.14); }
    .rl-u-warn { background:rgba(217,119,6,.20); }
    .rl-u-over { background:rgba(220,38,38,.22); color:var(--pd-bad); font-weight:700; }
    .rl-over-tag { font-size:10px; font-weight:700; color:var(--pd-bad); margin-left:6px; }
    .rl-legend { display:flex; flex-wrap:wrap; gap:16px; margin-top:10px; font-size:12px; color:var(--pd-muted); }
    .rl-lg { display:inline-flex; align-items:center; gap:6px; } .rl-lg .sw { width:14px; height:14px; border-radius:3px; display:inline-block; }

    .rl-note { font-size:12px; color:var(--pd-muted); margin-top:10px; }
    .rl-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; align-content:start; }
    .rl-form-full { grid-column:1 / -1; }
    .rl-form-sec { grid-column:1 / -1; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
      color:var(--pd-red); margin:14px 0 -2px; padding-top:12px; border-top:1px solid var(--pd-line); }
    .rl-form-grid > .rl-form-sec:first-child { margin-top:0; padding-top:0; border-top:none; }
    .rl-hint { grid-column:1 / -1; font-size:11.5px; color:var(--pd-muted); margin:-6px 0 0; }
    .rl-days { display:flex; gap:10px; flex-wrap:wrap; }
    .rl-days label { display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:400; }
  </style>
</head>
<body>
<div class="pd-app">
  <!-- Sidebar-less shell (uniform across the suite) -->
  <div class="pd-content">
    <div class="pd-topbar">
      <a class="pd-btn rl-modback" href="../../dashboard.html" title="Back to modules"><span data-ico="arrowLeft" data-ico-size="18"></span></a>
      <h1 class="rl-title" style="margin:0;">
        <span class="rl-title-ico" data-ico="users" data-ico-size="20"></span>
        <span class="rl-title-txt">Resource &amp; Role Master</span>
      </h1>
      <div class="rl-projctx">
        <select class="pd-select rl-project" id="rl-project" title="Project"></select>
      </div>
      <div class="rl-topbar-tools">
        <input class="pd-input rl-search-input" id="rl-search" placeholder="Search…" />
        <span class="rl-tb-sep"></span>
        <button class="pd-btn pd-btn-primary rl-tb-labeled" id="rl-add"><span data-ico="plus" data-ico-size="15"></span> <span id="rl-add-lbl">Add resource</span></button>
      </div>
      <div id="user-bar"></div>
    </div>
    <div class="pd-main">

      <div class="rl-tabs">
        <button class="rl-tab active" data-tab="resources"><span data-ico="users" data-ico-size="15"></span> Resources</button>
        <button class="rl-tab" data-tab="roles"><span data-ico="group" data-ico-size="15"></span> Roles</button>
        <button class="rl-tab" data-tab="calendars"><span data-ico="calendar" data-ico-size="15"></span> Calendars</button>
        <button class="rl-tab" data-tab="loading"><span data-ico="pulse" data-ico-size="15"></span> Loading</button>
      </div>

      <div class="rl-kpis" id="rl-kpis"></div>
      <div class="rl-filters" id="rl-filterbar" style="display:none;"></div>

      <!-- Master roster (Resources / Roles / Calendars) -->
      <div id="rl-roster">
        <div class="pd-card" style="padding:0;overflow:auto;">
          <table class="rl-table" id="rl-table"></table>
        </div>
        <p class="rl-note">
          OPC-style resource master: Default Units/Time and Max Units/Time (availability) are percentages.
          The <strong>Loading</strong> tab spreads assignments across time to show utilization vs each resource’s availability.
        </p>
      </div>

      <!-- Resource Loading (utilization matrix) -->
      <div id="rl-loading" style="display:none;">
        <div class="rl-load-controls">
          <div class="rl-seg" id="rl-mode">
            <button data-mode="util" class="active">Utilization %</button>
            <button data-mode="units">Units</button>
            <button data-mode="cost">Cost</button>
          </div>
          <label class="rl-ck"><input type="checkbox" id="rl-overonly"> Over-allocated only</label>
        </div>
        <div class="pd-card" style="padding:0;overflow:auto;">
          <table class="rl-matrix" id="rl-matrix"></table>
        </div>
        <div class="rl-legend">
          <span class="rl-lg"><span class="sw rl-u-ok"></span> ≤ 85% of availability</span>
          <span class="rl-lg"><span class="sw rl-u-warn"></span> 86–100%</span>
          <span class="rl-lg"><span class="sw rl-u-over"></span> over-allocated (&gt; 100%)</span>
        </div>
        <p class="rl-note" id="rl-load-note"></p>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="pd-modal-overlay" id="rl-modal" style="display:none;">
  <div class="pd-modal" style="max-width:620px;width:95vw;">
    <div class="pd-modal-header"><span id="rl-modal-title">Add</span><button class="pd-modal-close" id="rl-modal-x">&#215;</button></div>
    <div class="pd-modal-body"><form id="rl-form" class="rl-form-grid" onsubmit="return false;"></form></div>
    <div class="pd-modal-footer"><button class="pd-btn" id="rl-cancel">Cancel</button> <button class="pd-btn pd-btn-primary" id="rl-save">Save</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../assets/js/config.js?v=20260720b"></script>
<script src="../../assets/js/auth.js?v=20260720b"></script>
<script src="../../assets/js/db.js?v=20260720b"></script>
<script src="../../assets/js/ui.js?v=20260720b"></script>
<script src="../../assets/js/icons.js?v=20260720b"></script>
<script src="../../assets/js/calendar.js?v=20260720b"></script>
<script>
(function () {
  'use strict';
  var pid = null, tab = 'resources', rows = { resources: [], roles: [], calendars: [] }, editId = null, profile = null, search = '';
  var assignments = [], schedById = {}, loadingLoaded = false;         // Loading view data (lazy)
  var rfilters = { type: '', role: '', discipline: '' };
  var loadMode = 'util', overOnly = false;
  function sb() { return AppAuth.getSB(); }
  function esc(s) { return Fmt.esc(s); }
  var TYPES = ['Labor', 'Nonlabor', 'Material'];
  var TABLES = { resources: 'resources', roles: 'resource_roles', calendars: 'calendars' };
  var DAYS = [['work_mon', 'Mon'], ['work_tue', 'Tue'], ['work_wed', 'Wed'], ['work_thu', 'Thu'], ['work_fri', 'Fri'], ['work_sat', 'Sat'], ['work_sun', 'Sun']];
  var MABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fnum(n, dp) { if (n == null || !isFinite(n)) return '—'; var v = Math.round(n * Math.pow(10, dp)) / Math.pow(10, dp); return v.toLocaleString(undefined, { maximumFractionDigits: dp }); }

  async function loadProjects() {
    var projects = await PDb.getProjects();
    var sel = document.getElementById('rl-project');
    pid = sessionStorage.getItem('pd_project') || (projects[0] && projects[0].id) || null;
    sel.innerHTML = '<option value="">— Select project —</option>' + projects.map(function (p) {
      return '<option value="' + esc(p.id) + '"' + (p.id === pid ? ' selected' : '') + '>' + esc(p.name || p.id) + '</option>';
    }).join('');
    UI.enhanceProjectSelect(sel);   // shared searchable project picker
    if (pid) load();
  }

  async function load() {
    loadingLoaded = false;   // roster data changed → loading cache is stale
    if (!pid) { rows = { resources: [], roles: [], calendars: [] }; assignments = []; schedById = {}; render(); return; }
    var r1 = await sb().from('resources').select('*').eq('project_id', pid).order('resource_code');
    var r2 = await sb().from('resource_roles').select('*').eq('project_id', pid).order('name');
    var r3 = await sb().from('calendars').select('*').eq('project_id', pid).order('name');
    if (r1.error) { UI.toast(r1.error.message, 'error'); return; }
    if (r2.error) { UI.toast(r2.error.message, 'error'); return; }
    if (r3.error) { UI.toast(r3.error.message, 'error'); return; }
    rows.resources = r1.data || []; rows.roles = r2.data || []; rows.calendars = r3.data || [];
    await ensureDefaultCalendar();
    if (tab === 'loading') await loadLoading();
    render();
  }

  // Lazy-load the assignments + their activities' schedule dates for the Loading matrix.
  async function loadLoading() {
    if (loadingLoaded || !pid) return;
    var a = await sb().from('resource_assignments').select('*').eq('project_id', pid);
    if (a.error) { UI.toast(a.error.message, 'error'); return; }
    assignments = a.data || [];
    schedById = {};
    var codes = Array.from(new Set(assignments.map(function (x) { return x.activity_id; }).filter(Boolean)));
    if (codes.length) {
      // fetch only the assigned activities' dates (chunked IN to stay well under URL limits)
      for (var i = 0; i < codes.length; i += 200) {
        var chunk = codes.slice(i, i + 200);
        var s = await sb().from('project_schedule').select('activity_id,start_date,end_date,actual_start,actual_finish').eq('project_id', pid).in('activity_id', chunk);
        if (s.error) { UI.toast(s.error.message, 'error'); break; }
        (s.data || []).forEach(function (row) {
          if (!schedById[row.activity_id]) schedById[row.activity_id] = { s: row.actual_start || row.start_date, e: row.actual_finish || row.end_date };
        });
      }
    }
    loadingLoaded = true;
  }

  async function ensureDefaultCalendar() {
    if (!pid || rows.calendars.length || !profile) return;
    var d = PDCal.defaultCalendar();
    var payload = { project_id: pid, name: d.name, hours_per_day: d.hours_per_day,
      work_mon: d.work_mon, work_tue: d.work_tue, work_wed: d.work_wed, work_thu: d.work_thu,
      work_fri: d.work_fri, work_sat: d.work_sat, work_sun: d.work_sun, extra_holidays: [],
      is_default: true, created_by: profile.id };
    var res = await sb().from('calendars').insert(payload).select().single();
    if (!res.error) rows.calendars = [res.data];
  }

  function calName(id, legacyText) { var c = id && rows.calendars.find(function (x) { return x.id === id; }); return c ? c.name : (legacyText || '—'); }
  function calFor(res) {
    var c = res && res.calendar_id && rows.calendars.find(function (x) { return x.id === res.calendar_id; });
    if (!c) c = rows.calendars.find(function (x) { return x.is_default; });
    return c || PDCal.defaultCalendar();
  }
  function resCountForRole(name) { return rows.resources.filter(function (r) { return r.primary_role === name; }).length; }
  function resCountForCal(id) { return rows.resources.filter(function (r) { return r.calendar_id === id; }).length; }

  function filtered() {
    var list = rows[tab], q = search.toLowerCase().trim();
    return list.filter(function (r) {
      if (tab === 'resources') {
        if (rfilters.type && (r.type || 'Labor') !== rfilters.type) return false;
        if (rfilters.role && r.primary_role !== rfilters.role) return false;
      } else if (tab === 'roles') {
        if (rfilters.discipline && (r.discipline || '') !== rfilters.discipline) return false;
      }
      if (!q) return true;
      var hay = tab === 'resources' ? [r.resource_code, r.name, r.type, r.primary_role, calName(r.calendar_id, r.calendar)].join(' ')
        : tab === 'roles' ? [r.name, r.discipline, r.uom].join(' ')
        : [r.name].join(' ');
      return hay.toLowerCase().indexOf(q) !== -1;
    });
  }

  function calDayPattern(c) {
    var on = DAYS.filter(function (d) { return c[d[0]]; }).map(function (d) { return d[1]; });
    return on.length === 7 ? 'Every day' : on.join('/');
  }

  // ---------- render orchestration ----------
  function render() {
    var isLoad = tab === 'loading';
    document.getElementById('rl-roster').style.display = isLoad ? 'none' : '';
    document.getElementById('rl-loading').style.display = isLoad ? '' : 'none';
    document.getElementById('rl-add').style.display = isLoad ? 'none' : '';
    document.getElementById('rl-search').style.display = isLoad ? 'none' : '';
    document.getElementById('rl-add-lbl').textContent = tab === 'roles' ? 'Add role' : tab === 'calendars' ? 'Add calendar' : 'Add resource';
    renderKpis();
    renderFilterbar();
    if (isLoad) renderLoading(); else renderRoster();
  }

  function kpi(l, v, cls) { return '<div class="rl-kpi"><div class="rl-kpi-v ' + (cls || '') + '">' + v + '</div><div class="rl-kpi-l">' + l + '</div></div>'; }
  function renderKpis() {
    var host = document.getElementById('rl-kpis');
    if (!pid) { host.innerHTML = ''; return; }
    if (tab === 'loading') {
      var m = loadingModel();
      host.innerHTML = kpi('Resources assigned', m.resList.length) + kpi('Budgeted units', fnum(m.totUnits, 0)) +
        kpi('Budgeted cost', m.totCost ? Fmt.moneyShort(m.totCost) : '—') + kpi('Over-allocated', m.overCount, m.overCount ? 'rl-bad' : '');
    } else {
      var res = rows.resources;
      var avail = res.map(function (r) { return r.max_units_per_time; }).filter(function (x) { return x != null; });
      var avg = avail.length ? Math.round(avail.reduce(function (s, x) { return s + x; }, 0) / avail.length) : null;
      host.innerHTML = kpi('Resources', res.length) + kpi('Roles', rows.roles.length) +
        kpi('Calendars', rows.calendars.length) + kpi('Avg max availability', avg != null ? avg + '%' : '—');
    }
  }

  function renderFilterbar() {
    var host = document.getElementById('rl-filterbar');
    if (tab === 'resources') {
      host.style.display = '';
      var roleOpts = '<option value="">All roles</option>' + rows.roles.map(function (r) { return '<option' + (rfilters.role === r.name ? ' selected' : '') + '>' + esc(r.name) + '</option>'; }).join('');
      host.innerHTML = '<span class="rl-filt-ico" data-ico="filter" data-ico-size="15"></span>' +
        '<select class="pd-select" id="rl-f-type"><option value="">All types</option>' + TYPES.map(function (t) { return '<option' + (rfilters.type === t ? ' selected' : '') + '>' + t + '</option>'; }).join('') + '</select>' +
        '<select class="pd-select" id="rl-f-role">' + roleOpts + '</select>';
      document.getElementById('rl-f-type').onchange = function (e) { rfilters.type = e.target.value; renderRoster(); };
      document.getElementById('rl-f-role').onchange = function (e) { rfilters.role = e.target.value; renderRoster(); };
    } else if (tab === 'roles') {
      host.style.display = '';
      var discs = Array.from(new Set(rows.roles.map(function (r) { return r.discipline; }).filter(Boolean))).sort();
      host.innerHTML = '<span class="rl-filt-ico" data-ico="filter" data-ico-size="15"></span>' +
        '<select class="pd-select" id="rl-f-disc"><option value="">All disciplines</option>' + discs.map(function (d) { return '<option' + (rfilters.discipline === d ? ' selected' : '') + '>' + esc(d) + '</option>'; }).join('') + '</select>';
      document.getElementById('rl-f-disc').onchange = function (e) { rfilters.discipline = e.target.value; renderRoster(); };
    } else {
      host.style.display = 'none'; host.innerHTML = '';
    }
    if (window.Icons) Icons.hydrate(host);
  }

  function renderRoster() {
    var t = document.getElementById('rl-table'), f = filtered();
    if (tab === 'resources') {
      t.innerHTML = '<thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Primary Role</th>' +
        '<th class="num">Price/Unit</th><th class="num">Default Units/Time</th><th class="num">Max Units/Time</th><th>UoM</th><th>Calendar</th><th></th></tr></thead><tbody>' +
        (f.length ? f.map(function (r) {
          return '<tr>' +
            '<td><code style="font-size:12px;">' + esc(r.resource_code || '') + '</code></td>' +
            '<td>' + esc(r.name || '') + '</td>' +
            '<td><span class="rl-badge">' + esc(r.type || 'Labor') + '</span></td>' +
            '<td>' + esc(r.primary_role || '—') + '</td>' +
            '<td class="num">' + (r.price_per_unit != null ? Fmt.money(r.price_per_unit) : '—') + '</td>' +
            '<td class="num">' + (r.default_units_per_time != null ? r.default_units_per_time + '%' : '—') + '</td>' +
            '<td class="num">' + (r.max_units_per_time != null ? r.max_units_per_time + '%' : '—') + '</td>' +
            '<td>' + esc(r.uom || '') + '</td>' +
            '<td style="font-size:12px;color:var(--pd-muted);">' + esc(calName(r.calendar_id, r.calendar)) + '</td>' +

          '</tr>';
        }).join('') : '<tr><td colspan="10" class="rl-empty">' + (pid ? 'No resources match.' : 'Select a project.') + '</td></tr>') + '</tbody>';
    } else if (tab === 'roles') {

        (f.length ? f.map(function (r) {

            '<td><div class="rl-actions"><button class="rl-btn-sm" data-edit="' + r.id + '">Edit</button><button class="rl-btn-sm" data-del="' + r.id + '">&#215;</button></div></td>' +
          '</tr>';
        }).join('') : '<tr><td colspan="7" class="rl-empty">' + (pid ? 'No roles match.' : 'Select a project.') + '</td></tr>') + '</tbody>';
    } else {
      t.innerHTML = '<thead><tr><th>Name</th><th>Working days</th><th class="num">Hours/day</th><th class="num">Extra holidays</th><th class="num">Resources</th><th></th></tr></thead><tbody>' +
        (f.length ? f.map(function (r) {
          var n = resCountForCal(r.id);
          return '<tr>' +
            '<td><strong>' + esc(r.name || '') + '</strong>' + (r.is_default ? ' <span class="rl-badge">Default</span>' : '') + '</td>' +

            '<td class="num">' + (n ? '<span class="rl-badge">' + n + '</span>' : '0') + '</td>' +
            '<td><div class="rl-actions"><button class="rl-btn-sm" data-edit="' + r.id + '">Edit</button><button class="rl-btn-sm" data-del="' + r.id + '">&#215;</button></div></td>' +
          '</tr>';
        }).join('') : '<tr><td colspan="6" class="rl-empty">' + (pid ? 'No calendars match.' : 'Select a project.') + '</td></tr>') + '</tbody>';
    }
    t.querySelectorAll('[data-edit]').forEach(function (b) { b.onclick = function () { openForm(rows[tab].find(function (x) { return x.id === b.dataset.edit; })); }; });

    if (window.Icons) Icons.hydrate(t);
  }

  // ---------- Loading (utilization matrix) ----------
  // Spread [s,e] across calendar months, weighting each month by its working days
  // (per the resource's calendar). Returns { 'YYYY-MM': fraction } summing to 1.
  function spreadFractions(sISO, eISO, cal) {
    var s = pd(sISO), e = pd(eISO); if (!s || !e || e < s) return null;
    var months = [], c = new Date(s.getFullYear(), s.getMonth(), 1);
    while (c <= e) { months.push(new Date(c)); c = new Date(c.getFullYear(), c.getMonth() + 1, 1); }
    var wd = months.map(function (m) {
      var a = new Date(Math.max(+m, +s)), b = new Date(Math.min(+new Date(m.getFullYear(), m.getMonth() + 1, 0), +e));
      return PDCal.workingDaysInRange(cal, a, b);
    });
    var tot = wd.reduce(function (x, y) { return x + y; }, 0);
    var out = {};
    months.forEach(function (m, i) {
      var key = m.getFullYear() + '-' + String(m.getMonth() + 1).padStart(2, '0');
      out[key] = tot > 0 ? wd[i] / tot : 1 / months.length;   // fallback: even split
    });
    return out;
  }
  function pd(v) { if (!v) return null; var m = String(v).match(/(\d{4})-(\d{2})-(\d{2})/); return m ? new Date(+m[1], +m[2] - 1, +m[3]) : null; }
  function capacity(res, monthKey) {
    var cal = calFor(res), p = monthKey.split('-');
    var wd = PDCal.workingDaysInMonth(cal, +p[0], +p[1] - 1);
    var maxpct = (res && res.max_units_per_time != null) ? res.max_units_per_time : 100;
    var perDay = (res && /hour/i.test(res.uom || 'hours')) ? (cal.hours_per_day || 8) : 1;
    return maxpct / 100 * wd * perDay;
  }
  function loadingModel() {
    var byRes = {}, monthsSet = {}, totUnits = 0, totCost = 0;
    assignments.forEach(function (a) {
      var res = a.resource_id && rows.resources.find(function (x) { return x.id === a.resource_id; });
      var key = a.resource_id || ('code:' + (a.resource_code || a.role || '—'));
      var b = byRes[key] || (byRes[key] = { name: res ? res.name : (a.resource_code || a.role || '—'), res: res, months: {}, totUnits: 0, totCost: 0, unsched: 0 });
      var units = +a.budgeted_units || 0;
      var cost = (a.budgeted_cost != null) ? +a.budgeted_cost : units * ((res && res.price_per_unit) || 0);
      b.totUnits += units; b.totCost += cost; totUnits += units; totCost += cost;
      var sd = schedById[a.activity_id];
      var fr = sd && sd.s && sd.e ? spreadFractions(sd.s, sd.e, calFor(res)) : null;
      if (fr) {
        Object.keys(fr).forEach(function (mk) {
          monthsSet[mk] = 1;
          var cell = b.months[mk] || (b.months[mk] = { units: 0, cost: 0 });
          cell.units += units * fr[mk]; cell.cost += cost * fr[mk];
        });
      } else { b.unsched += units; }
    });
    var months = Object.keys(monthsSet).sort();
    var resList = Object.keys(byRes).map(function (k) { return byRes[k]; });
    var overCount = 0;
    resList.forEach(function (b) {
      b.over = false; b.peak = 0;
      months.forEach(function (mk) {
        var cell = b.months[mk]; if (!cell) return;
        var cap = capacity(b.res, mk);
        cell.util = cap > 0 ? cell.units / cap * 100 : (cell.units > 0 ? Infinity : 0);
        if (isFinite(cell.util)) b.peak = Math.max(b.peak, cell.util);
        if (cell.util > 100) b.over = true;
      });
      if (b.over) overCount++;
    });
    resList.sort(function (a, b) { return b.totUnits - a.totUnits; });
    return { resList: resList, months: months, overCount: overCount, totUnits: totUnits, totCost: totCost };
  }
  function utilClass(u) { return u == null ? '' : u > 100 ? 'rl-u-over' : u > 85 ? 'rl-u-warn' : 'rl-u-ok'; }
  function cellText(cell, mode) {
    if (!cell) return '';
    if (mode === 'units') return fnum(cell.units, 1);
    if (mode === 'cost') return cell.cost ? Fmt.moneyShort(cell.cost) : '';
    return cell.util == null ? '' : (isFinite(cell.util) ? Math.round(cell.util) + '%' : '∞');
  }
  function renderLoading() {
    var mx = document.getElementById('rl-matrix');
    var note = document.getElementById('rl-load-note');
    document.querySelectorAll('#rl-mode button').forEach(function (b) { b.classList.toggle('active', b.dataset.mode === loadMode); });
    if (!assignments.length) {
      mx.innerHTML = '<tbody><tr><td class="rl-empty">' + (pid ? 'No resource assignments yet. Assign resources to activities in the Project Schedule module (Resource Assignments), then they load here.' : 'Select a project.') + '</td></tr></tbody>';
      note.textContent = ''; return;
    }
    var m = loadingModel();
    var list = overOnly ? m.resList.filter(function (b) { return b.over; }) : m.resList;
    if (!list.length) { mx.innerHTML = '<tbody><tr><td class="rl-empty">No over-allocated resources. 🎉</td></tr></tbody>'; note.textContent = ''; return; }
    var head = '<thead><tr><th>Resource</th>' + m.months.map(function (mk) { var p = mk.split('-'); return '<th>' + MABBR[+p[1] - 1] + " '" + p[0].slice(2) + '</th>'; }).join('') + '<th>Total</th></tr></thead>';
    var body = list.map(function (b) {
      var cells = m.months.map(function (mk) {
        var cell = b.months[mk];
        return '<td class="' + utilClass(cell && cell.util) + '">' + cellText(cell, loadMode) + '</td>';
      }).join('');
      var total = loadMode === 'cost' ? (b.totCost ? Fmt.moneyShort(b.totCost) : '—') : fnum(b.totUnits, 1);
      return '<tr><td>' + esc(b.name) + (b.over ? '<span class="rl-over-tag">OVER</span>' : '') + '</td>' + cells + '<td>' + total + '</td></tr>';
    }).join('');
    // totals row (units/cost only; utilization doesn't sum across resources)
    var footCells = m.months.map(function (mk) {
      var v = list.reduce(function (s, b) { var c = b.months[mk]; return s + (c ? (loadMode === 'cost' ? c.cost : c.units) : 0); }, 0);
      return '<td>' + (loadMode === 'util' ? '' : loadMode === 'cost' ? (v ? Fmt.moneyShort(v) : '') : fnum(v, 1)) + '</td>';
    }).join('');
    var grand = loadMode === 'cost' ? (m.totCost ? Fmt.moneyShort(m.totCost) : '—') : loadMode === 'units' ? fnum(m.totUnits, 1) : '';
    var foot = '<tfoot><tr><td>Total</td>' + footCells + '<td>' + grand + '</td></tr></tfoot>';
    mx.innerHTML = head + '<tbody>' + body + '</tbody>' + foot;
    var uns = m.resList.reduce(function (s, b) { return s + (b.unsched || 0); }, 0);
    note.textContent = 'Assignments are spread across each activity’s dates (from Project Schedule), weighted by the resource’s working calendar; utilization = allocated ÷ (Max Units/Time × working capacity).' +
      (uns ? ' ' + fnum(uns, 0) + ' unit(s) are on activities with no dates and are counted in totals only.' : '');
  }

  // ---------- forms ----------
  function roleOptions(sel) {
    return '<option value="">—</option>' + rows.roles.map(function (r) { return '<option' + (sel === r.name ? ' selected' : '') + '>' + esc(r.name) + '</option>'; }).join('');
  }
  function calOptions(sel) {
    if (sel == null) { var def = rows.calendars.find(function (c) { return c.is_default; }); if (def) sel = def.id; }
    return '<option value="">—</option>' + rows.calendars.map(function (c) {
      return '<option value="' + esc(c.id) + '"' + (sel === c.id ? ' selected' : '') + '>' + esc(c.name) + (c.is_default ? ' (Default)' : '') + '</option>';
    }).join('');
  }
  function typeOptions(sel) { return TYPES.map(function (o) { return '<option' + (sel === o ? ' selected' : '') + '>' + o + '</option>'; }).join(''); }

  function openForm(row) {
    if (!pid) { UI.toast('Select a project first.', 'error'); return; }
    if (tab === 'loading') return;
    editId = row ? row.id : null;
    var form = document.getElementById('rl-form');
    document.getElementById('rl-modal-title').textContent = (row ? 'Edit ' : 'Add ') + (tab === 'roles' ? 'role' : tab === 'calendars' ? 'calendar' : 'resource');
    if (tab === 'resources') {
      row = row || {};
      form.innerHTML =
        sec('Identification') +
        fld('ID', '<input class="pd-input" id="f-code" value="' + esc(row.resource_code) + '" placeholder="e.g. R150082">') +
        fld('Name', '<input class="pd-input" id="f-name" value="' + esc(row.name) + '">') +
        sec('Classification') +
        fld('Type', '<select class="pd-select" id="f-type">' + typeOptions(row.type || 'Labor') + '</select>') +
        fld('Primary Role', '<select class="pd-select" id="f-role">' + roleOptions(row.primary_role) + '</select>') +
        fld('Price / Unit (₱)', '<input class="pd-input" id="f-rate" type="number" min="0" step="0.01" value="' + (row.price_per_unit != null ? row.price_per_unit : '') + '" placeholder="e.g. 550 per hour/day">') +
        sec('Availability &amp; Calendar') +
        fld('Default Units/Time (%)', '<input class="pd-input" id="f-def" type="number" min="0" step="1" value="' + (row.default_units_per_time != null ? row.default_units_per_time : 100) + '">') +
        fld('Max Units/Time (%)', '<input class="pd-input" id="f-max" type="number" min="0" step="1" value="' + (row.max_units_per_time != null ? row.max_units_per_time : 100) + '">') +
        fld('UoM', '<input class="pd-input" id="f-uom" value="' + esc(row.uom || 'hours') + '">') +
        fld('Calendar', '<select class="pd-select" id="f-cal">' + calOptions(row.calendar_id) + '</select>') +
        sec('Notes') +
        fld('Remarks', '<textarea class="pd-input" id="f-rem" rows="2">' + esc(row.remarks) + '</textarea>', true);
      // Cost roll-up: picking a Primary Role prefills the rate from the role's default when empty.
      var roleSel = document.getElementById('f-role'), rateInp = document.getElementById('f-rate');
      roleSel.onchange = function () { if (!rateInp.value) { var ro = rows.roles.find(function (x) { return x.name === roleSel.value; }); if (ro && ro.price_per_unit != null) rateInp.value = ro.price_per_unit; } };
    } else if (tab === 'roles') {
      row = row || {};
      form.innerHTML =
        fld('Role name', '<input class="pd-input" id="f-name" value="' + esc(row.name) + '" placeholder="e.g. Planning Engineer">', true) +
        fld('Discipline', '<input class="pd-input" id="f-disc" value="' + esc(row.discipline) + '" placeholder="e.g. Labor / Engineering">') +
        fld('UoM', '<input class="pd-input" id="f-uom" value="' + esc(row.uom || 'hours') + '">') +
        fld('Price / Unit (₱)', '<input class="pd-input" id="f-rate" type="number" min="0" step="0.01" value="' + (row.price_per_unit != null ? row.price_per_unit : '') + '">') +
        hint('The role’s Price/Unit is offered as the default rate when a resource picks this role and has no rate of its own.') +
        fld('Remarks', '<textarea class="pd-input" id="f-rem" rows="2">' + esc(row.remarks) + '</textarea>', true);
    } else {
      row = row || { hours_per_day: 8, work_mon: true, work_tue: true, work_wed: true, work_thu: true, work_fri: true, work_sat: true, work_sun: false };
      form.innerHTML =
        fld('Calendar name', '<input class="pd-input" id="f-name" value="' + esc(row.name) + '" placeholder="e.g. Philippine Standard (6-day, 8h)">', true) +
        sec('Schedule') +
        fld('Hours per day', '<input class="pd-input" id="f-hpd" type="number" min="1" max="24" step="0.5" value="' + (row.hours_per_day != null ? row.hours_per_day : 8) + '">') +
        fld('Working days', '<div class="rl-days">' + DAYS.map(function (d) { return '<label><input type="checkbox" data-day="' + d[0] + '"' + (row[d[0]] ? ' checked' : '') + '> ' + d[1] + '</label>'; }).join('') + '</div>', true) +
        sec('Extra holidays') +
        fld('Movable / proclaimed dates', '<textarea class="pd-input" id="f-hol" rows="3" placeholder="2026-03-20">' + esc((row.extra_holidays || []).join('\n')) + '</textarea>', true) +
        hint('One YYYY-MM-DD per line — e.g. Eid’l Fitr, Eid’l Adha, or a proclamation-moved date. PH regular holidays (New Year’s, Holy Week, Araw ng Kagitingan, Labor Day, Independence Day, National Heroes Day, Bonifacio Day, Christmas, Rizal Day) are already applied automatically every year.');
    }
    document.getElementById('rl-modal').style.display = 'flex';
    if (window.Icons) Icons.hydrate(form);
  }
  function fld(label, control, full) { return '<div class="' + (full ? 'rl-form-full' : '') + '"><label class="pd-label">' + label + '</label>' + control + '</div>'; }
  function sec(label) { return '<div class="rl-form-sec">' + label + '</div>'; }
  function hint(text) { return '<p class="rl-hint">' + text + '</p>'; }

  function v(id) { var e = document.getElementById(id); return e ? e.value.trim() : ''; }
  function num(id) { var x = v(id); return x === '' ? null : parseFloat(x); }

  async function save() {
    var payload, table = TABLES[tab];
    if (tab === 'resources') {
      if (!v('f-name')) { UI.toast('Name is required.', 'error'); return; }
      var code = v('f-code');
      if (code) {   // duplicate resource-code guard (within the project)
        var dup = rows.resources.find(function (r) { return r.id !== editId && (r.resource_code || '').toLowerCase() === code.toLowerCase(); });
        if (dup) { UI.toast('Resource ID “' + code + '” already exists in this project.', 'error'); return; }
      }
      payload = { project_id: pid, resource_code: code || null, name: v('f-name'),
        type: document.getElementById('f-type').value, primary_role: document.getElementById('f-role').value || null,
        default_units_per_time: num('f-def'), max_units_per_time: num('f-max'), price_per_unit: num('f-rate'),
        uom: v('f-uom') || null, calendar_id: document.getElementById('f-cal').value || null, remarks: v('f-rem') || null, updated_at: new Date().toISOString() };
    } else if (tab === 'roles') {
      if (!v('f-name')) { UI.toast('Role name is required.', 'error'); return; }
      payload = { project_id: pid, name: v('f-name'), discipline: v('f-disc') || null, uom: v('f-uom') || null, price_per_unit: num('f-rate'), remarks: v('f-rem') || null, updated_at: new Date().toISOString() };
    } else {
      if (!v('f-name')) { UI.toast('Calendar name is required.', 'error'); return; }
      var holidays = v('f-hol').split('\n').map(function (s) { return s.trim(); }).filter(function (s) { return /^\d{4}-\d{2}-\d{2}$/.test(s); });
      payload = { project_id: pid, name: v('f-name'), hours_per_day: num('f-hpd') || 8, extra_holidays: holidays, updated_at: new Date().toISOString() };
      DAYS.forEach(function (d) { payload[d[0]] = !!document.querySelector('[data-day="' + d[0] + '"]').checked; });
    }
    var res;
    if (editId) { res = await sb().from(table).update(payload).eq('id', editId); }
    else { payload.created_by = profile.id; res = await sb().from(table).insert(payload); }
    if (res.error) { UI.toast(res.error.message, 'error'); return; }
    UI.toast(editId ? 'Saved.' : 'Added.', 'success');
    document.getElementById('rl-modal').style.display = 'none'; editId = null; load();
  }

  // Delete with referential guards (the FKs have no ON DELETE, so an in-use delete
  // would otherwise fail with a raw Postgres error).
  async function del(id) {
    if (tab === 'roles') {
      var role = rows.roles.find(function (x) { return x.id === id; });
      var n = role ? resCountForRole(role.name) : 0;
      if (!confirm(n ? n + ' resource(s) list “' + role.name + '” as their Primary Role. Deleting the role leaves that text on them. Delete anyway?' : 'Delete this role?')) return;
    } else if (tab === 'calendars') {
      var cal = rows.calendars.find(function (x) { return x.id === id; });
      var used = resCountForCal(id);
      if (used) { UI.toast(used + ' resource(s) use this calendar — reassign them before deleting.', 'error'); return; }
      if (!confirm((cal && cal.is_default ? 'This is the default calendar. ' : '') + 'Delete this calendar?')) return;
    } else {
      // resource: assignments may not be loaded — count server-side.
      var cnt = await sb().from('resource_assignments').select('id', { count: 'exact', head: true }).eq('resource_id', id);
      if (!cnt.error && cnt.count) { UI.toast(cnt.count + ' assignment(s) reference this resource — remove them in Project Schedule first.', 'error'); return; }
      if (!confirm('Delete this resource?')) return;
    }
    var res = await sb().from(TABLES[tab]).delete().eq('id', id);
    if (res.error) { UI.toast(res.error.message, 'error'); return; }
    UI.toast('Deleted.', 'success'); load();
  }

  AppAuth.requireLogin(function (user, prof) {
    profile = prof; UI.renderUserBar(prof); UI.initShell();
    document.querySelectorAll('.rl-tab').forEach(function (b) {
      b.onclick = function () {
        tab = b.dataset.tab;
        document.querySelectorAll('.rl-tab').forEach(function (x) { x.classList.toggle('active', x === b); });
        if (tab === 'loading' && !loadingLoaded && pid) { loadLoading().then(render); } else { render(); }
      };
    });
    document.getElementById('rl-project').onchange = function (e) { pid = e.target.value || null; if (pid) sessionStorage.setItem('pd_project', pid); load(); };
    document.getElementById('rl-search').oninput = function (e) { search = e.target.value; renderRoster(); };
    document.getElementById('rl-add').onclick = function () { openForm(null); };
    document.getElementById('rl-modal-x').onclick = document.getElementById('rl-cancel').onclick = function () { document.getElementById('rl-modal').style.display = 'none'; editId = null; };
    document.getElementById('rl-save').onclick = save;
    document.getElementById('rl-modal').onclick = function (e) { if (e.target === this) { this.style.display = 'none'; editId = null; } };
    document.querySelectorAll('#rl-mode button').forEach(function (b) { b.onclick = function () { loadMode = b.dataset.mode; renderLoading(); }; });
    document.getElementById('rl-overonly').onchange = function (e) { overOnly = e.target.checked; renderLoading(); };
    loadProjects();
  });
})();
